<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='Lesson')}">
    <title>Lesson</title>
</head>

<style>
    /* Định nghĩa class riêng để tránh xung đột Inline Style */
    .btn-gallery {
        background-color: #28a745;
        color: white;
        border: 2px solid transparent;
        transition: 0.3s;
    }
    .btn-gallery:hover {
        background-color: #218838 !important;
        color: white !important;
    }

    .btn-flash {
        background-color: #007bff;
         color: white;
         border: 2px solid transparent;
         transition: 0.3s;
     }

    .btn-flash:hover {
        background-color: #0069d9 !important;
        color: white !important;
    }

    /* Card scene cấp category */
    .scene-category-card {
        display: flex;
    max-width: 1000px;
    width: 100%;
    margin: 0 auto 28px auto;
    align-items: center;
    gap: 16px;
    border: 2px solid #dc3545;
    border-radius: 16px;
    padding: 16px 20px;
    background-color: #fff5f5;
    transition: box-shadow 0.2s;
    }
    .scene-category-card:hover {
        box-shadow: 0 4px 16px rgba(220, 53, 69, 0.15);
    }
    .scene-category-icon {
        width: 56px;
        height: 56px;
        min-width: 56px;
        background: #dc3545;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .scene-category-progress {
        height: 6px;
        border-radius: 10px;
        background-color: #f8d7da;
        max-width: 320px;
        margin-top: 6px;
    }
    .scene-category-progress .bar {
        height: 6px;
        border-radius: 10px;
        background-color: #dc3545;
        transition: width 0.4s ease;
    }
    .btn-interactive {
        background-color: #dc3545;
        color: white;
        border: 2px solid transparent;
        transition: 0.3s;
        white-space: nowrap;
    }
    .btn-interactive:hover {
        background-color: #c82333 !important;
        color: white !important;
    }
</style>


<body>
<th:block th:replace="~{layout :: spinner}"></th:block>
<th:block th:replace="~{layout :: navbar}" th:with="currentPage='categories'"></th:block>

<!-- SỬA: Thêm kiểm tra thumbnailUrl null và fallback -->
<div class="container-fluid bg-primary py-1.5 mb-4"
     th:style="'background: linear-gradient(rgba(24, 29, 56, .5), rgba(24, 29, 56, .7)), ' +
     'url(' + (${categories != null && categories.thumbnailUrl != null ? '/' + categories.thumbnailUrl : '/img/default-bg.jpg'}) + '); ' +
     'background-position: center center; background-repeat: no-repeat; background-size: cover;'">
    <div class="container py-5 text-center">
        <h1 class="display-3 text-white animated slideInDown"
            th:text="${'Chủ đề: ' + (categories != null ? categories.categoryName : 'Không xác định')}">Chủ đề: Tên mặc
            định</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item"><a class="text-white" th:href="@{/}">Trang chủ</a></li>
                <li class="breadcrumb-item"><a class="text-white" th:href="@{/study/categories}">Từ vựng</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page"
                    th:text="${categories != null ? categories.categoryName : 'Không xác định'}">
                    Đồ ăn
                </li>
            </ol>
        </nav>
    </div>
</div>

<div class="container pt-2">

    <!-- CARD SCENE CẤP CATEGORY -->
    <div class="scene-category-card">
        <div class="scene-category-icon">
            <i class="fas fa-mouse-pointer fs-4 text-white"></i>
        </div>
        <div class="flex-grow-1">
            <h5 class="fw-bold mb-1" style="color: #c82333;">Hình ảnh tương tác</h5>
            <p class="text-muted small mb-1">
                Luyện tập toàn bộ từ vựng trong chủ đề
                <strong th:text="${categories != null ? categories.categoryName : ''}"></strong>
            </p>
            <div class="d-flex align-items-center gap-2" style="max-width: 340px;">
                <div class="scene-category-progress flex-grow-1">
                    <div class="bar"
                         th:style="'width: ' + ${categories != null && categories.progress != null ? categories.progress : 0} + '%;'">
                    </div>
                </div>
                <span class="fw-bold small" style="color: #dc3545; min-width: 36px;"
                      th:text="${categories != null && categories.progress != null ? categories.progress : 0} + '%'">0%</span>
            </div>
        </div>
        <a th:href="@{/study/interactive(categoryId=${categories?.id})}"
           class="btn-interactive fw-bold rounded-pill px-4 py-2 shadow-sm text-decoration-none">
            Vào học
        </a>
    </div>

    <div id="lesson-list-container" class="lesson-container">

        <!-- SỬA: Thêm kiểm tra categories != null cho progress -->
        <div class="lesson-group mb-4" th:each="lesson : ${lessons}">
            <div class="lesson-item shadow-sm" th:classappend="${lesson?.free ? 'status-current' : 'status-locked'}">
                <div class="lesson-icon" th:classappend="${lesson?.free ? 'icon-current' : 'icon-locked'}">
                    <i th:if="${!lesson?.free}" class="fas fa-lock"></i>
                    <span th:if="${lesson?.free}" th:text="${lesson?.orderIndex}">1</span>
                </div>
                <div class="ms-4 flex-grow-1">
                    <h5 class="fw-bold mb-1" th:text="${lesson?.lessonName}">Tên bài học</h5>
                </div>
                <div>
                    <button th:if="${!lesson?.free}" class="btn btn-secondary disabled rounded-pill px-4">Đã khóa
                    </button>

                    <button th:if="${lesson?.free}"
                            class="btn btn-warning text-white fw-bold px-4 rounded-pill shadow-sm"
                            type="button" data-bs-toggle="collapse"
                            th:data-bs-target="'#sub-modes-' + ${lesson?.id}"
                            style="padding-top: 12px; padding-bottom: 12px;">
                        Học ngay
                    </button>
                </div>
            </div>

            <div th:if="${lesson?.free}" class="collapse mt-2" th:id="'sub-modes-' + ${lesson?.id}"
                 data-bs-parent="#lesson-list-container">
                <div class="d-flex flex-column gap-2 ms-5 ps-3 border-start"
                     style="border-width: 3px !important; gap: 5px;">

                    <div class="lesson-item shadow-sm p-2 bg-white border"
                         style="min-height: 50px; border-radius: 15px; margin-bottom: 0;">
                        <div class="lesson-icon icon-current shadow-none"
                             style="width: 50px; height: 50px; min-width: 50px; background: #28a745;">
                            <i class="fas fa-th-large fs-5 text-white"></i>
                        </div>
                        <div class="ms-3 flex-grow-1">
                            <h6 class="fw-bold mb-0" style="font-size: 1rem;">Học từ vựng mới</h6>
                        </div>
                        <a th:href="@{/study/gallery(id=${lesson?.id})}"
                           class="btn-gallery fw-bold rounded-pill px-4 py-2 shadow-sm text-decoration-none">Vào học</a>
                    </div>

                    <div class="lesson-item shadow-sm p-2 bg-white border"
                         style="min-height: 50px; border-radius: 15px; margin-bottom: 0;">
                        <div class="lesson-icon icon-current shadow-none"
                             style="width: 50px; height: 50px; min-width: 50px; background: #007bff;">
                            <i class="fas fa-clone fs-5 text-white"></i>
                        </div>
                        <div class="ms-3 flex-grow-1">
                            <h6 class="fw-bold mb-0" style="font-size: 1rem;">Flashcard</h6>
                        </div>
                        <a th:href="@{/study/flashcards(id=${lesson?.id})}"
                           class="btn-flash fw-bold rounded-pill px-4 py-2 shadow-sm text-decoration-none"
                        >Vào học</a>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>

</body>
</html>
