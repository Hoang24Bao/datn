<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='Từ vựng')}">
    <title>About</title>
</head>

<body>
<th:block th:replace="~{layout :: spinner}"></th:block>
<th:block th:replace="~{layout :: navbar}" th:with="currentPage='vocab'"></th:block>

<!-- Header Start -->
<div class="container-fluid bg-primary py-3 mb-5 page-header">
    <div class="container py-4 text-center">
        <h1 class="display-3 text-white animated slideInDown">Từ vựng</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item"><a class="text-white" href="../index.html">Trang chủ</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page">Học tập - Từ vựng</li>
            </ol>
        </nav>
    </div>
</div>
<!-- Header End -->


<!--Categories Start-->
<div class="container-xxl py-5">
    <div class="container">
        <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
            <h6 class="section-title bg-white text-center px-3 mb-4">Danh mục học tập</h6>
            <h1 class="mb-5">Hãy chọn chủ đề bạn muốn học</h1>
        </div>

        <!--Filter-->
        <div class="row g-4 mb-5 justify-content-center wow fadeInUp" data-wow-delay="0.1s">
            <div class="col-12 text-center">
                <div class="filter-container d-inline-flex p-2 bg-light rounded-pill shadow-sm">
                    <button type="button" class="btn-filter active" data-filter="all">Tất cả</button>
                    <button type="button" class="btn-filter" data-filter="n5">Cấp độ N5</button>
                    <button type="button" class="btn-filter" data-filter="n4">Cấp độ N4</button>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-3 col-md-6 wow fadeInUp"
                 th:each="category : ${categories}"
                 data-wow-delay="0.1s">

                <div class="card topic-item shadow">
                    <div class="topic-img-wrapper">
                        <span class="badge bg-success topic-badge" th:text="${category.jlptLevel}">N5</span>

                        <img th:src="'/' + ${category.iconUrl != null ? category.iconUrl : '/img/course-1.jpg'}"
                             th:alt="${category.categoryName}">
                    </div>

                    <div class="card-body p-4">
                        <div class="mb-3">
                            <h5 class="fw-bold mb-1" th:text="${category.categoryName}">Tên chủ đề</h5>
                            <small class="text-muted">
                                <i class="fa fa-book-open me-2"></i>
                                <span th:text="${category.totalLessons != null ? category.totalLessons : 0}">0</span>
                                Bài học
                            </small>
                        </div>

                        <div class="d-flex border-top border-bottom py-2 mb-3">
                            <small class="flex-fill text-center"><i class="fa fa-star text-warning me-1"></i>4.5</small>
                            <small class="flex-fill text-center border-start border-end"><i
                                    class="fa fa-user-graduate me-1"></i>500+</small>
                            <small class="flex-fill text-center"><i class="fa fa-clock me-1"></i>2h</small>
                        </div>

                        <div class="progress-container mb-4">
                            <div class="d-flex justify-content-between mb-1" style="font-size: 12px;">
                                <span class="fw-bold">Tiến độ</span>
                                <span class="text-primary fw-bold"
                                      th:text="${(category.progress != null ? category.progress : 0) + '%'}">0%</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar progress-bar-ganbatte"
                                     th:style="'width: ' + ${(category.progress != null ? category.progress : 0)} + '%'"></div>
                            </div>
                        </div>

                        <a th:href="@{/study/lessons(id=${category.id})}"
                           class="btn btn-ganbatte w-100 rounded-pill py-2">
                            Học ngay <i class="fa fa-chevron-right ms-2 fs-10"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!--Categories End-->

<th:block th:replace="~{layout :: footer}"></th:block>

<script>
    $(document).ready(function () {
        $('.btn-filter').click(function () {
            $('.btn-filter').removeClass('active');
            $(this).addClass('active');
            var filterValue = $(this).attr('data-filter');
            console.log("Đang lọc theo: " + filterValue);
        });
    });
</script>
</body>
</html>
