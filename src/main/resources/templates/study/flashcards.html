<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='Flashcard')}"></head>
<style>
    .lesson-header {
        background: white;
        padding: 10px 5px;
        border-radius: 0 0 20px 20px;
        margin-top: 20px;
        margin-bottom: 25px;
    }

    .flashcard-bg {
        background-color: #f8f9fa;
    }

    /* Loading overlay */
    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .loading-spinner {
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
    }
</style>

<body class="flashcard-bg">
<th:block th:replace="~{layout :: spinner}"></th:block>
<th:block th:replace="~{layout :: navbar}" th:with="currentPage='flashcard'"></th:block>

<div class="container lesson-header d-flex justify-content-between align-items-center">
    <div>
        <h3 class="fw-bold mb-0 text-dark d-flex align-items-center" style="font-size: 1.5rem;">
            <i class="fas fa-th me-2" style="color: #fb873f;"></i>
            <span id="lesson-name" th:text="${lesson != null ? lesson.lessonName : 'Tiếng Nhật'}">Tiếng Nhật</span>
        </h3>
    </div>
    <button onclick="cancelAndExit()" class="btn btn-ganbatte rounded-pill px-4">
        <i class="fas fa-arrow-left me-2"></i>Thoát
    </button>
</div>

<!--Learning Start-->
<div class="container py-3">
    <div class="learning-wrapper" id="learningWrapper">

        <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="text-muted small">Tiến trình học</span>
            <span id="progress-text" class="fw-bold" style="color: #fb873f;">0/0</span>
        </div>
        <div class="progress mb-4" style="height: 10px; border-radius: 10px;">
            <div id="progress-bar" class="progress-bar" style="width: 0%; background-color: #fb873f;"></div>
        </div>

        <div class="position-relative d-flex align-items-center">
            <button class="btn-nav btn-nav-left" onclick="prevWord()">
                <i class="fas fa-chevron-left"></i>
            </button>

            <div class="flashcard-container" onclick="toggleFlip()">
                <div class="flashcard" id="flashcard">
                    <div class="card-front">
                        <button onclick="playAudio(event)" class="btn-audio">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <img id="vocab-img" src="/img/default-vocab.jpg" alt="Từ vựng" class="vocab-img">
                        <div id="vocab-expression" class="expression-text"></div>
                        <div id="vocab-kana" class="jp-text"></div>
                        <div id="vocab-romaji" class="romaji-text"></div>
                        <audio id="vocab-audio" src=""></audio>
                    </div>
                    <div class="card-back">
                        <p class="text-muted mb-3" style="font-size: 20px; font-weight: bold;">Ý nghĩa</p>
                        <div id="vocab-vn" class="vn-text"></div>
                        <hr class="w-100">
                        <p class="small text-muted" style="font-size: 15px;">Nhấn vào thẻ để xem mặt trước</p>
                    </div>
                </div>
            </div>

            <button class="btn-nav btn-nav-right" onclick="nextWord()">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <div class="d-flex justify-content-center gap-3 mt-0">
            <button class="btn-learn btn-control btn-not-learned" onclick="markNotLearned()" style="font-size: 15px;">
                <i class="fas fa-chevron-left me-2"></i>Chưa thuộc
            </button>
            <button class="btn-learn btn-control btn-learned" onclick="markLearned()">
                Đã thuộc<i class="fas fa-chevron-right ms-2"></i>
            </button>
        </div>

    </div>

    <div id="noDataMessage" class="text-center py-5" style="display: none;">
        <i class="fas fa-book-open fa-4x mb-3" style="color: #adb5bd;"></i>
        <h4 class="text-muted">Chưa có từ vựng trong bài học này</h4>
        <p class="text-muted">Vui lòng quay lại sau hoặc liên hệ quản trị viên</p>
        <a href="/study/lessons?id=" th:href="@{/study/lessons(id=${categoryId})}" class="btn-custom btn-teal mt-3">
            <i class="fas fa-arrow-left me-2"></i>Quay lại danh sách bài học
        </a>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:inline="javascript">
    const vocabulary = /*[[${vocabs}]]*/ [];
    const lessonName = /*[[${lesson != null ? lesson.lessonName : 'Tiếng Nhật'}]]*/ 'Tiếng Nhật';
    const lessonId = /*[[${lesson != null ? lesson.id : 0}]]*/ 0;
    const categoryId = /*[[${currentCateId}]]*/ 1;
</script>

<script>
    // ==================== BIẾN TOÀN CỤC ====================
    let currentIndex = 0;
    let isProcessing = false;
    let isSessionActive = false;
    let sessionVocabList = [];
    let tempResults = {};

    document.getElementById('lesson-name').innerText = lessonName;

    if (!vocabulary || vocabulary.length === 0) {
        document.getElementById('learningWrapper').style.display = 'none';
        document.getElementById('noDataMessage').style.display = 'block';
    } else {
        document.getElementById('learningWrapper').style.display = 'block';
        document.getElementById('noDataMessage').style.display = 'none';
        startSession();
    }

    // ==================== API ====================
    function getToken() {
        return localStorage.getItem('token');
    }

    function showLoading(show) {
        let overlay = document.getElementById('loadingOverlay');
        if (show) {
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = '<div class="loading-spinner"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 mb-0">Đang xử lý...</p></div>';
                document.body.appendChild(overlay);
            }
            overlay.style.display = 'flex';
        } else if (overlay) {
            overlay.style.display = 'none';
        }
    }

    async function startSession() {
        const token = getToken();
        if (!token || vocabulary.length === 0) return;
        showLoading(true);
        try {
            const response = await fetch('/api/study-session/start', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ lessonId: lessonId })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                isSessionActive = true;
                sessionVocabList = data.vocabularies;
                if (sessionVocabList.length > 0) {
                    updateUI();
                }
            } else {
                alert('Không thể bắt đầu phiên học: ' + (data.error || 'Lỗi không xác định'));
            }
        } catch (error) {
            console.error(error);
            alert('Không thể kết nối đến server');
        } finally {
            showLoading(false);
        }
    }

    async function saveTempResult(vocabId, isLearned) {
        const token = getToken();
        if (!token || !isSessionActive) return false;
        try {
            const response = await fetch('/api/study-session/temp-result', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ vocabId: vocabId, isLearned: isLearned })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                tempResults[vocabId] = isLearned;
                return true;
            }
            return false;
        } catch (error) {
            console.error(error);
            return false;
        }
    }

    async function endSessionAndSave() {
        const token = getToken();
        if (!token || !isSessionActive) return false;
        showLoading(true);
        try {
            const response = await fetch('/api/study-session/end', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });
            const data = await response.json();
            if (response.ok && data.success) {
                isSessionActive = false;
                return { success: true, data: data };
            }
            return { success: false, error: data.error };
        } catch (error) {
            return { success: false, error: error.message };
        } finally {
            showLoading(false);
        }
    }

    async function cancelSession() {
        const token = getToken();
        if (!token || !isSessionActive) return true;
        try {
            const response = await fetch('/api/study-session/cancel', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });
            const data = await response.json();
            isSessionActive = false;
            return data.success;
        } catch (error) {
            return false;
        }
    }

    // ==================== XỬ LÝ ====================
    async function markLearned() {
        if (isProcessing || !isSessionActive) return;
        isProcessing = true;
        const currentVocab = getCurrentVocab();
        if (!currentVocab) { isProcessing = false; return; }
        const success = await saveTempResult(currentVocab.id, true);
        if (success) {
            setTimeout(() => { nextWord(); isProcessing = false; }, 200);
        } else {
            alert('Không thể lưu kết quả');
            isProcessing = false;
        }
    }

    async function markNotLearned() {
        if (isProcessing || !isSessionActive) return;
        isProcessing = true;
        const currentVocab = getCurrentVocab();
        if (!currentVocab) { isProcessing = false; return; }
        const success = await saveTempResult(currentVocab.id, false);
        if (success) {
            setTimeout(() => { nextWord(); isProcessing = false; }, 200);
        } else {
            alert('Không thể lưu kết quả');
            isProcessing = false;
        }
    }

    function getCurrentVocab() {
        if (!sessionVocabList || sessionVocabList.length === 0) return null;
        return sessionVocabList[currentIndex];
    }

    function toggleFlip() {
        document.getElementById('flashcard').classList.toggle('flipped');
    }

    function updateUI() {
        if (!sessionVocabList || sessionVocabList.length === 0) return;
        const flashcard = document.getElementById('flashcard');
        const word = sessionVocabList[currentIndex];
        const total = sessionVocabList.length;
        const timestamp = new Date().getTime();
        flashcard.style.transition = 'none';
        flashcard.classList.remove('flipped');
        void flashcard.offsetWidth;
        document.getElementById('vocab-expression').innerText = word.expression || "";
        document.getElementById('vocab-kana').innerText = word.kana || "";
        document.getElementById('vocab-romaji').innerText = word.romaji || "";
        document.getElementById('vocab-vn').innerText = word.meaning || "";
        const imgElement = document.getElementById('vocab-img');
        if (word.imageUrl && word.imageUrl.trim() !== '') {
            imgElement.src = word.imageUrl + '?v=' + timestamp;
        } else {
            imgElement.src = '/img/default-vocab.jpg';
        }
        const audioPath = word.audioUrl;
        document.getElementById('vocab-audio').src = audioPath;
        const currentPos = currentIndex + 1;
        document.getElementById('progress-text').innerText = `${currentPos}/${total}`;
        document.getElementById('progress-bar').style.width = `${(currentPos / total) * 100}%`;
        setTimeout(() => {
            flashcard.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
        }, 10);
    }

    async function nextWord() {
        if (currentIndex < sessionVocabList.length - 1) {
            currentIndex++;
            updateUI();
        } else {
            await finishLesson();
        }
    }

    function prevWord() {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
        }
    }

    // ==================== MODAL KẾT QUẢ ====================
    function showResultModal(learnedCount, notLearnedCount, total, totalUpdated) {
        const oldModal = document.getElementById('customResultModal');
        if (oldModal) oldModal.remove();

        const learnedPercent  = total > 0 ? Math.round(learnedCount    / total * 100) : 0;
        const notLearnedPercent = total > 0 ? Math.round(notLearnedCount / total * 100) : 0;

        const overlay = document.createElement('div');
        overlay.id = 'customResultModal';
        overlay.setAttribute('style', [
            'all: initial',
            'position: fixed',
            'inset: 0',
            'width: 100%',
            'height: 100%',
            'background: rgba(24,29,56,0.6)',
            'display: flex',
            'justify-content: center',
            'align-items: center',
            'z-index: 2147483647',
            'box-sizing: border-box',
            'padding: 16px',
        ].join(';'));

        overlay.innerHTML = `
            <div style="
                background: #ffffff;
                border-radius: 25px;
                width: 100%;
                max-width: 440px;
                max-height: 92vh;
                overflow-y: auto;
                box-shadow: 0 25px 60px rgba(24,29,56,0.18);
                padding: 36px 32px 28px;
                box-sizing: border-box;
                font-family: 'Be Vietnam Pro', 'Arial', sans-serif;
            ">
                <!-- Header -->
                <div style="text-align:center; margin-bottom:24px;">
                    <div style="font-size:52px; line-height:1; margin-bottom:14px;">🎉</div>
                    <div style="
                        font-size:26px; font-weight:800; color:#181d38;
                        font-family:'Be Vietnam Pro','Arial',sans-serif;
                        margin-bottom:6px;
                    ">Chúc mừng!</div>
                    <div style="
                        font-size:15px; color:#8a94a6;
                        font-family:'Be Vietnam Pro','Arial',sans-serif;
                    ">Bạn đã hoàn thành <strong style="color:#fb873f;">${lessonName}</strong></div>
                </div>

                <!-- 2 ô kết quả -->
                <div style="display:flex; gap:14px; margin-bottom:24px;">
                    <div style="
                        flex:1; background:linear-gradient(135deg,#f0fdf4,#dcfce7);
                        border:2px solid #22c55e; border-radius:20px;
                        padding:20px 12px; text-align:center;
                    ">
                        <div style="font-size:40px; line-height:1; margin-bottom:8px;">✅</div>
                        <div style="
                            font-size:42px; font-weight:800; color:#16a34a;
                            font-family:'Be Vietnam Pro','Arial',sans-serif; line-height:1;
                        ">${learnedCount}</div>
                        <div style="
                            font-size:13px; color:#15803d; font-weight:700; margin-top:6px;
                            font-family:'Be Vietnam Pro','Arial',sans-serif;
                            text-transform:uppercase; letter-spacing:0.5px;
                        ">Đã thuộc</div>
                    </div>
                    <div style="
                        flex:1; background:linear-gradient(135deg,#fef2f2,#fee2e2);
                        border:2px solid #ef4444; border-radius:20px;
                        padding:20px 12px; text-align:center;
                    ">
                        <div style="font-size:40px; line-height:1; margin-bottom:8px;">📖</div>
                        <div style="
                            font-size:42px; font-weight:800; color:#dc2626;
                            font-family:'Be Vietnam Pro','Arial',sans-serif; line-height:1;
                        ">${notLearnedCount}</div>
                        <div style="
                            font-size:13px; color:#b91c1c; font-weight:700; margin-top:6px;
                            font-family:'Be Vietnam Pro','Arial',sans-serif;
                            text-transform:uppercase; letter-spacing:0.5px;
                        ">Chưa thuộc</div>
                    </div>
                </div>

                <!-- Thanh tiến trình -->
                <div style="
                    background:#f8f9fa; border-radius:16px; padding:16px 18px; margin-bottom:24px;
                ">
                    <div style="
                        display:flex; justify-content:space-between; align-items:center;
                        margin-bottom:10px;
                    ">
                        <span style="
                            font-size:14px; font-weight:700; color:#181d38;
                            font-family:'Be Vietnam Pro','Arial',sans-serif;
                        ">Tỉ lệ hoàn thành</span>
                        <span style="
                            font-size:22px; font-weight:800; color:#fb873f;
                            font-family:'Be Vietnam Pro','Arial',sans-serif;
                        ">${learnedPercent}%</span>
                    </div>
                    <div style="
                        height:10px; background:#e9ecef; border-radius:999px; overflow:hidden;
                    ">
                        <div style="
                            width:${learnedPercent}%; height:100%;
                            background:linear-gradient(90deg,#fb873f,#f69050);
                            border-radius:999px;
                            transition:width 0.6s ease;
                        "></div>
                    </div>
                    <div style="
                        display:flex; justify-content:space-between;
                        margin-top:8px; font-size:12px; color:#8a94a6;
                        font-family:'Be Vietnam Pro','Arial',sans-serif;
                    ">
                        <span>${learnedCount}/${total} từ đã thuộc</span>
                        <span>${notLearnedCount} từ cần ôn lại</span>
                    </div>
                </div>

                <!-- Nút hành động -->
                <div style="display:flex; gap:12px; justify-content:center;">
                    <button id="modalBtnBack" style="
                        flex:1; background:#06BBCC; color:white; border:none;
                        padding:13px 20px; border-radius:50px; cursor:pointer;
                        font-size:15px; font-weight:700;
                        font-family:'Be Vietnam Pro','Arial',sans-serif;
                        box-shadow:0 4px 15px rgba(6,187,204,0.3);
                        transition:opacity 0.2s;
                    " onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
                        ← Về Bài học
                    </button>
                    <button id="modalBtnRetry" style="
                        flex:1; background:#fb873f; color:white; border:none;
                        padding:13px 20px; border-radius:50px; cursor:pointer;
                        font-size:15px; font-weight:700;
                        font-family:'Be Vietnam Pro','Arial',sans-serif;
                        box-shadow:0 4px 15px rgba(251,135,63,0.3);
                        transition:opacity 0.2s;
                    " onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
                        ↺ Học lại
                    </button>
                </div>
            </div>
        `;

        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';

        document.getElementById('modalBtnBack').onclick = () => {
            overlay.remove();
            document.body.style.overflow = '';
            window.location.href = "/study/lessons?id=" + categoryId;
        };

        document.getElementById('modalBtnRetry').onclick = () => {
            overlay.remove();
            document.body.style.overflow = '';
            window.location.reload();
        };

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.remove();
                document.body.style.overflow = '';
            }
        });
    }

    async function finishLesson() {
        if (!isSessionActive) return;
        showLoading(true);
        const result = await endSessionAndSave();
        showLoading(false);

        if (result.success) {
            // Đếm số từ "Đã thuộc" và "Chưa thuộc" dựa trên tempResults
            let learnedCount = 0;
            let notLearnedCount = 0;

            for (const [vocabId, isLearned] of Object.entries(tempResults)) {
                if (isLearned === true) {
                    learnedCount++;
                } else {
                    notLearnedCount++;
                }
            }

            const total = sessionVocabList.length;
            const totalUpdated = result.data.totalUpdated || 0;

            showResultModal(learnedCount, notLearnedCount, total, totalUpdated);
        } else {
            alert(result.error || 'Không thể lưu kết quả học tập');
        }
    }

    async function cancelAndExit() {
        if (!isSessionActive) {
            window.location.href = "/study/lessons?id=" + categoryId;
            return;
        }
        if (confirm('Bạn có chắc muốn thoát? Tiến trình học hiện tại sẽ KHÔNG được lưu!')) {
            showLoading(true);
            await cancelSession();
            showLoading(false);
            window.location.href = "/study/lessons?id=" + categoryId;
        }
    }

    function playAudio(event) {
        event.stopPropagation();
        const audio = document.getElementById('vocab-audio');
        audio.play().catch(e => console.error("Không tìm thấy file âm thanh:", audio.src));
    }

    window.prevWord = prevWord;
    window.nextWord = nextWord;
    window.markLearned = markLearned;
    window.markNotLearned = markNotLearned;
    window.toggleFlip = toggleFlip;
    window.playAudio = playAudio;
    window.cancelAndExit = cancelAndExit;

    document.addEventListener('keydown', function(e) {
        if (!isSessionActive || sessionVocabList.length === 0) return;
        const activeElement = document.activeElement;
        if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA')) return;
        if (e.key === 'ArrowRight') { e.preventDefault(); nextWord(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); prevWord(); }
        else if (e.key === ' ' || e.key === 'Space' || e.key === 'ArrowUp' || e.key === 'ArrowDown') { e.preventDefault(); toggleFlip(); }
    });
</script>

</body>
</html>
