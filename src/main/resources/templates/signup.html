<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='Đăng ký - Ganbatte')}">
    <title>Đăng ký</title>
</head>

<style>
    .link-login {
        color: #06BBCC;
        transition: 0.3s;
    }

    .link-login:hover {
        color: #0096a6;
    }
</style>

<body>
<th:block th:replace="~{layout :: spinner}"></th:block>
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container-fluid bg-primary py-5 mb-5 page-header4">
    <div class="container py-5 text-center">
        <h1 class="display-3 text-white animated slideInDown">Đăng ký</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item"><a class="text-white" th:href="@{/}">Trang chủ</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page">Đăng ký</li>
            </ol>
        </nav>
    </div>
</div>
<div class="container-xxl py-5 mt-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.5s">
                <form id="signupForm" class="shadow p-4 bg-white" style="border-radius: 20px;">
                    <div class="text-center mb-4">
                        <h1 class="mb-3">Tạo tài khoản</h1>
                        <p class="text-muted">Chào mừng bạn đến với hệ thống học tiếng Nhật Ganbatte</p>
                    </div>

                    <div class="row g-3">
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="fullname" placeholder="Họ và tên" required>
                                <label for="fullname">Họ và tên</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="username" placeholder="Tên đăng nhập" required>
                                <label for="username">Tên đăng nhập</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" placeholder="Email" required>
                                <label for="email">Email</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                                <label for="password">Mật khẩu</label>
                            </div>
                        </div>

                        <input type="hidden" id="role" value="user">

                        <div class="col-12">
                            <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm" type="submit">
                                ĐĂNG KÝ NGAY
                            </button>
                        </div>

                        <div class="col-12 text-center mt-3">
                            <p>Bạn đã có tài khoản? <a class="fw-bold text-decoration-none link-login" th:href="@{/login}">Đăng nhập</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{layout :: footer}"></th:block>

<script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const emailInput = document.getElementById('email');

        // 1. KHAI BÁO BIẾN NÀY ĐỂ LẤY GIÁ TRỊ TỪ Ô INPUT
        const emailValue = emailInput.value;

        const emailPattern = /^[a-z0-9._%+-]+@[a-z0-9.-]+\.com$/;

        // 2. Kiểm tra định dạng Email chuẩn cho hệ thống Ganbatte
        if (!emailPattern.test(emailValue)) {
            Swal.fire({
                icon: 'error',
                title: 'Email không hợp lệ!',
                text: 'Email phải có dấu @ và kết thúc bằng .com',
                confirmButtonColor: '#06BBCC'
            });
            emailInput.focus();
            return;
        }

        // 3. Bây giờ biến emailValue đã có giá trị để nạp vào userData
        const userData = {
            userName: document.getElementById('username').value,
            fullname: document.getElementById('fullname').value,
            email: emailValue,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Ganbatte!',
                    text: 'Đăng ký thành công! Hãy bắt đầu học N5/N4 nhé.',
                    showConfirmButton: false,
                    timer: 2000
                }).then(() => {
                    window.location.href = '/login';
                });
            } else {
                const errorMsg = await response.text();
                Swal.fire({ icon: 'warning', title: 'Lỗi', text: errorMsg });
            }
        } catch (error) {
            Swal.fire({ icon: 'error', title: 'Lỗi kết nối', text: 'Không thể gọi API' });
        }
    });
</script>


</body>
</html>
