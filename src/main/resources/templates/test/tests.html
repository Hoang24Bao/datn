<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: html_head(title='Bài kiểm tra')}"></head>
<style>
    .test-container {
        background-color: #f8f9fa;
        min-height: 100vh;
    }

    .category-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
        transition: all 0.3s;
        border: 1px solid #eee;
        cursor: pointer;
    }

    .category-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .category-icon {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 12px;
    }

    .category-name {
        font-size: 1.2rem;
        font-weight: 700;
        color: #2C3E50;
    }

    .loading-state {
        text-align: center;
        padding: 50px;
    }

    .filter-container {
        display: inline-flex;
        gap: 12px;
        padding: 10px;
        background-color: #f8f9fa;
        border-radius: 50px;
        border: 1px solid #eee;
    }

    .btn-filter {
        border: none;
        background: transparent;
        padding: 8px 25px;
        border-radius: 50px;
        font-weight: 600;
        transition: all 0.3s ease;
        color: #666;
        cursor: pointer;
    }

    .btn-filter:hover {
        background-color: #fff;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .btn-filter.active {
        background-color: #fb873f;
        color: white !important;
        box-shadow: 0 4px 12px rgba(251, 135, 63, 0.3);
    }
</style>

<body class="test-container">
<th:block th:replace="~{layout :: spinner}"></th:block>
<th:block th:replace="~{layout :: navbar}" th:with="currentPage='test'"></th:block>

<!-- Header -->
<div class="container-fluid bg-primary py-3 mb-5">
    <div class="container py-5 text-center">
        <h1 class="display-3 text-white animated slideInDown">Bài kiểm tra</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item"><a class="text-white" th:href="@{/}">Trang chủ</a></li>
                <li class="breadcrumb-item"><a class="text-white" th:href="@{/study/categories}">Học tập</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page">Bài kiểm tra</li>
            </ol>
        </nav>
    </div>
</div>

<div class="container py-4">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Chọn chủ đề</h2>
        <p class="text-muted">Chọn một chủ đề để bắt đầu làm bài kiểm tra</p>
    </div>

    <div class="row g-4 mb-5 justify-content-center">
        <div class="col-12 text-center">
            <div class="filter-container d-inline-flex p-2 bg-light rounded-pill shadow-sm">
                <button type="button" class="btn-filter active" data-filter="all" onclick="filterCategories('all')">
                    Tất cả
                </button>
                <button type="button" class="btn-filter" data-filter="n5" onclick="filterCategories('n5')">N5</button>
                <button type="button" class="btn-filter" data-filter="n4" onclick="filterCategories('n4')">N4</button>
            </div>
        </div>
    </div>

    <div id="categoryGrid" class="row g-4">
        <div class="col-12 text-center py-5">
            <div class="loading-state"><i class="fas fa-spinner fa-spin me-2"></i> Đang tải chủ đề...</div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: footer}"></th:block>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const token = localStorage.getItem('token');
    const userId = localStorage.getItem('userId');
    let allCategories = [];

    if (!token || !userId) {
        window.location.href = '/login';
    }

    async function loadCategories() {
        try {
            const response = await fetch(`/api/tests/categories-with-status`,{
                headers: {'Authorization': 'Bearer ' + token}
            });
            allCategories = await response.json();
            renderCategories(allCategories);
        } catch (error) {
            console.error(error);
        }
    }

    function renderCategories(categories) {
        const grid = document.getElementById('categoryGrid');

        if (!categories || categories.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center py-5"><i class="fas fa-folder-open fa-4x mb-3"></i><h4>Chưa có chủ đề nào</h4></div>';
            return;
        }

        grid.innerHTML = categories.map(cat => {
            let imageUrl = cat.iconUrl || 'https://placehold.co/400x200?text=No+Image';
            if (imageUrl && !imageUrl.startsWith('http') && !imageUrl.startsWith('/')) {
                imageUrl = '/' + imageUrl;
            }

            return `
                <div class="col-lg-3 col-md-6">
                    <div class="category-card" onclick="selectCategory(${cat.id}, '${escapeHtml(cat.name)}')">
                        <div class="d-flex align-items-center gap-3">
                            <img src="${imageUrl}" class="category-icon" onerror="this.src='https://placehold.co/60x60?text=No+Image'">
                            <div>
                                <div class="category-name">${escapeHtml(cat.name)}</div>
                                <small class="text-muted">${cat.jlptLevel || 'N5'}</small>
                            </div>
                        </div>
                        <div class="mt-3">
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar bg-success" style="width: ${cat.progressPercent || 0}%"></div>
                            </div>
                            <div class="d-flex justify-content-between mt-1">
                                <small class="text-muted">Tiến độ</small>
                                <small class="text-primary">${cat.progressPercent || 0}%</small>
                            </div>
                        </div>
                        <div class="mt-3 text-end">
                            <small class="text-primary"><i class="fas fa-chevron-right"></i> Xem bài kiểm tra</small>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterCategories(level) {
        if (level === 'all') {
            renderCategories(allCategories);
        } else {
            const filtered = allCategories.filter(cat => cat.jlptLevel?.toLowerCase() === level.toLowerCase());
            renderCategories(filtered);
        }

        document.querySelectorAll('.btn-filter').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-filter') === level) btn.classList.add('active');
        });
    }

    function selectCategory(categoryId, categoryName) {
        sessionStorage.setItem('selectedCategoryName', categoryName);
        window.location.href = `/test/category-tests?categoryId=${categoryId}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadCategories();
</script>
</body>
</html>
