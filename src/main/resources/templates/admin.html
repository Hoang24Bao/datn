<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='Hệ thống quản trị - Ganbatte')}">
</head>
<link th:href="@{/css/admin.css}" rel="stylesheet">

<body>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar">
    <a th:href="@{/}" class="sidebar-logo">
        <img th:src="@{/img/icons.png}" alt="Logo">
        <div class="logo-text">
            <span class="gan">Gan</span><span class="batte">batte</span>
        </div>
    </a>

    <div class="sidebar-section-label">Tổng quan</div>
    <nav class="sidebar-nav">
        <button class="nav-item active" onclick="loadSection('dashboard', this, event)">
            <div class="nav-icon"><i class="fas fa-chart-pie"></i></div>
            <span class="nav-label">Thống kê</span>
        </button>
        <button class="nav-item" onclick="loadSection('users', this, event)">
            <div class="nav-icon"><i class="fas fa-user-friends"></i></div>
            <span class="nav-label">Người dùng</span>
        </button>
    </nav>

    <div class="sidebar-section-label">Nội dung</div>
    <nav class="sidebar-nav">
        <button class="nav-item" onclick="loadSection('categories', this, event)">
            <div class="nav-icon"><i class="fas fa-th-large"></i></div>
            <span class="nav-label">Chủ đề</span>
        </button>
        <button class="nav-item" onclick="loadSection('lessons', this, event)">
            <div class="nav-icon"><i class="fas fa-book-reader"></i></div>
            <span class="nav-label">Bài học</span>
        </button>
        <button class="nav-item" onclick="loadSection('vocabulary', this, event)">
            <div class="nav-icon"><i class="fas fa-spell-check"></i></div>
            <span class="nav-label">Từ vựng</span>
        </button>
    </nav>

    <div class="sidebar-footer">
        <div class="user-mini">
            <img id="sidebarAvatar" src="" alt="Admin">
            <div class="user-mini-info">
                <p id="sidebarAdminName">Admin</p>
                <span>Trực tuyến</span>
            </div>
        </div>
    </div>
</aside>

<div class="main">
    <header class="topbar">
        <div class="topbar-left" style="display: flex; align-items: center;">
            <button class="mobile-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <h4 id="page-main-title">Dashboard Tổng Quan</h4>
        </div>
        <div class="topbar-right">
            <a th:href="@{/}" class="btn-home">
                <i class="fas fa-home"></i> <span>Trang chủ</span>
            </a>
            <div class="topbar-divider"></div>
            <div class="dropdown">
                <div class="admin-profile" data-bs-toggle="dropdown" style="cursor:pointer;">
                    <img id="adminAvatar" src="" width="40" height="40">
                    <div class="admin-info">
                        <p id="adminName">Admin</p>
                        <span>Trực tuyến</span>
                    </div>
                    <i class="fas fa-chevron-down"
                       style="font-size: 11px; color: var(--text-muted); margin-left: 4px;"></i>
                </div>
                <ul class="dropdown-menu dropdown-menu-end mt-3">
                    <li><a class="dropdown-item" href="/profile"><i class="fa fa-id-card me-2 text-primary"></i>Hồ
                        sơ</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item text-danger fw-bold" href="#" onclick="logout()"><i
                            class="fa fa-sign-out-alt me-2"></i>Đăng xuất</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main class="content" id="main-content">
    </main>
</div>
<!--aria-hidden="true"-->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content"
             style="border-radius: 20px; border: none; box-shadow: 0 15px 50px rgba(0,0,0,0.2);">
            <div class="modal-header" style="border-bottom: 1px solid #eee; padding: 20px 25px;">
                <h5 class="modal-title" style="font-weight: 700; color: var(--text-dark);">
                    <i class="fas fa-folder-plus me-2" style="color: var(--teal);"></i>Thêm chủ đề mới
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 25px;">
                <form id="categoryForm">
                    <div class="mb-3">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Tên chủ đề</label>
                        <input type="text" id="catName" class="form-control"
                               placeholder="Ví dụ: Gia đình, Động vật..."
                               style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Avatar</label>

                        <div class="input-group">
                                <span class="input-group-text"
                                      style="border-radius: 10px 0 0 10px; background: #f8f9fa;">
                                    <i class="fas fa-image"></i>
                                </span>
                            <input type="text" id="catIconUrl" class="form-control" placeholder="Chưa chọn ảnh..."
                                   readonly style="cusor: default; padding: 12px; border: 1px solid #ddd;">

                            <button class="btn btn-orange" type="button"
                                    onclick="document.getElementById('fileInput').click()"
                                    style="border-radius: 0 10px 10px 0; color: white; font-weight: 600;">
                                <i class="fas fa-upload me-1"></i> Chọn ảnh
                            </button>
                            <input type="file" id="fileInput" style="display: none;" accept="image/*"
                                   onchange="handleFileSelect(this)">
                        </div>

                        <div id="iconPreview" class="mb-3 text-center" style="display:none;">
                            <div style="position: relative; display: inline-block;">
                                <img src="" id="previewImg"
                                     style="width: 200px; height: 200px; object-fit: cover; border-radius: 15px; padding: 5px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">

                            </div>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Cấp độ JLPT</label>
                        <select id="catLevel" class="form-select"
                                style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;">
                            <option value="N5">N5 (Cơ bản)</option>
                            <option value="N4">N4 (Sơ cấp)</option>
                            <option value="N3">N3 (Trung cấp)</option>
                            <option value="N2">N2 (Thượng cấp)</option>
                            <option value="N1">N1 (Cao cấp)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-top: none; padding: 0 25px 25px;">
                <button type="button" class="btn-custom btn-red" data-bs-dismiss="modal"
                        style="font-weight: 600; color: #fff;">Hủy
                </button>
                <button type="button" class="btn-custom btn-teal" onclick="submitCategory()">
                    <i class="fas fa-save me-2"></i>Lưu chủ đề
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="lessonModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content"
             style="border-radius: 20px; border: none; box-shadow: 0 15px 50px rgba(0,0,0,0.2);">
            <div class="modal-header" style="border-bottom: 1px solid #eee; padding: 20px 25px;">
                <h5 class="modal-title" style="font-weight: 700; color: var(--text-dark);">
                    <i class="fas fa-book-open me-2" style="color: #06BBCC;"></i>Thêm bài học mới
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 25px;">
                <form id="lessonForm">
                    <div class="mb-4">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Tên bài học</label>
                        <input type="text" id="lessonName" class="form-control" placeholder="Ví dụ: Bài 1: Chào hỏi"
                               style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Chủ đề</label>
                        <select id="lessonCategorySelect" class="form-select"
                                style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;">
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-top: none; padding: 0 25px 25px;">
                <button type="button" class="btn-custom btn-red" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn-custom btn-teal" onclick="submitLesson()">
                    <i class="fas fa-save me-2"></i>Lưu bài học
                </button>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="vocabModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="fas fa-spell-check me-2"
                                                   style="color: var(--teal);"></i>Thêm
                    từ vựng mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 20px;">
                <form id="vocabForm">
                    <div class="row">
                        <div class="col-md-6 border-end">
                            <div class="mb-3">
                                <label class="form-label fw-600">Từ vựng (Kanji/Gốc)</label>
                                <input type="text" id="vExpression" class="form-control" placeholder="VD: 食べる"
                                       required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Cách đọc (Kana)</label>
                                <input type="text" id="vKana" class="form-control" placeholder="VD: たべる" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Romaji</label>
                                <input type="text" id="vRomaji" class="form-control" placeholder="VD: taberu">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Ý nghĩa (Tiếng Việt)</label>
                                <input type="text" id="vMeaning" class="form-control" placeholder="VD: Ăn" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Loại từ</label>
                                <select id="vWordType" class="form-select">
                                    <option value="Danh từ">Danh từ</option>
                                    <option value="Động từ">Động từ</option>
                                    <option value="Tính từ">Tính từ</option>
                                    <option value="Trạng từ">Trạng từ</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-600">Chọn Chủ đề</label>
                                <select id="vCategoryId" class="form-select" onchange="onVocabCategoryChange()">
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Chọn Bài học</label>
                                <div id="lessonSelectContainer">
                                    <select id="vLessonId" class="form-select" required
                                            style="border: 2px solid var(--teal);">
                                        <option value="">-- Chọn bài học --</option>
                                    </select>
                                </div>
                                <div id="quickAddLessonContainer" class="mt-2" style="display: none;">
                                    <p class="text-danger small mb-1"><i class="fas fa-exclamation-circle"></i> Chủ
                                        đề
                                        này chưa có bài học!</p>
                                    <button type="button" class="btn btn-sm btn-outline-primary w-100"
                                            onclick="openQuickAddLesson()">
                                        <i class="fas fa-plus"></i> Tạo bài học mới cho chủ đề này
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Câu ví dụ (Nhật)</label>
                                <textarea id="vExample" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Dịch ví dụ (Việt)</label>
                                <textarea id="vExampleVi" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">URL Ảnh / Audio (Tùy chọn)</label>
                                <input type="text" id="vImageUrl" class="form-control mb-2" placeholder="Link ảnh">
                                <input type="text" id="vAudioUrl" class="form-control" placeholder="Link audio">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-custom btn-red" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn-custom btn-teal" onclick="submitVocab()">Lưu từ vựng</button>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="userViewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <div class="modal-header"
                 style="background-color: #f8f9fa; border-radius: 20px 20px 0 0; border-bottom: 1px solid #eee;">
                <h5 class="modal-title fw-bold"><i class="fas fa-user-circle me-2" style="color: var(--teal);"></i>Chi
                    tiết học viên</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div class="text-center mb-4">
                    <img id="viewUserAvatar" src="" class="rounded-circle shadow-sm"
                         style="width: 100px; height: 100px; object-fit: cover; border: 4px solid #fff; background: #eee;">
                    <h5 id="viewFullnameTitle" class="mt-3 fw-bold mb-1"></h5>
                    <div id="viewUserStatusBadge"></div>
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label small text-muted fw-bold">Mã học viên (ID)</label>
                        <input type="text" id="viewId" class="form-control bg-light border-0"
                               style="border-radius: 8px;" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-muted fw-bold">Tên đăng nhập</label>
                        <input type="text" id="viewUsername" class="form-control bg-light border-0"
                               style="border-radius: 8px;" readonly>
                    </div>

                    <div class="col-12">
                        <label class="form-label small text-muted fw-bold">Địa chỉ Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="text" id="viewEmail" class="form-control bg-light border-0" readonly>
                        </div>
                    </div>

                    <div class="col-6">
                        <label class="form-label small text-muted fw-bold">Trình độ JLPT</label>
                        <input type="text" id="viewLevel" class="form-control bg-light border-0"
                               style="border-radius: 8px;" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-muted fw-bold">Tổng điểm tích lũy</label>
                        <input type="text" id="viewPoints" class="form-control bg-light border-0"
                               style="border-radius: 8px; font-weight: bold; color: var(--teal);" readonly>
                    </div>

                    <div class="col-12">
                        <label class="form-label small text-muted fw-bold">Ngày tham gia hệ thống</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i
                                    class="fas fa-calendar-alt text-muted"></i></span>
                            <input type="text" id="viewCreated" class="form-control bg-light border-0" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="border-top: none; padding-top: 0;">
                <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal"
                        style="border-radius: 10px; font-weight: 600;">Đóng thông tin
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:inline="javascript">
    // HÀM TIỆN ÍCH
    function getAvatarPath(url, fullname) {
        const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(fullname)}&background=06BBCC&color=fff`;
        if (!url) return defaultAvatar;
        let path = (url.startsWith('img/') || url.startsWith('http')) ? url : `img/avatar/${url}`;
        return `${path}?v=${new Date().getTime()}`;
    }

    function toggleSidebar() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    const dashboardTemplate = `
    <div class="breadcrumb-bar">
        <div class="chip active"><i class="fas fa-chart-pie" style="margin-right:5px; font-size:10px;"></i>Thống kê</div>
        <span class="sep">›</span><div class="chip">Dashboard</div>
    </div>
    <div class="stats-grid">
        <div class="stat-card teal">
            <div class="stat-top"><div class="stat-icon teal"><i class="fas fa-users"></i></div></div>
            <div class="stat-value" id="totalUsers">0</div><div class="stat-label">Tổng Học Viên</div>
        </div>
        <div class="stat-card red">
            <div class="stat-top"><div class="stat-icon red"><i class="fas fa-th-large"></i></div></div>
            <div class="stat-value" id="totalCategories">0</div><div class="stat-label">Tổng Chủ Đề</div>
        </div>
        <div class="stat-card green">
            <div class="stat-top"><div class="stat-icon green"><i class="fas fa-book"></i></div></div>
            <div class="stat-value" id="totalLessons">0</div><div class="stat-label">Tổng Bài Học</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-top"><div class="stat-icon orange"><i class="fas fa-language"></i></div></div>
            <div class="stat-value" id="totalVocab">0</div><div class="stat-label">Kho Từ Vựng</div>
        </div>
    </div>
    <div class="table-section">
        <div class="table-header">
            <div class="table-header-left"><h4>Học viên mới tham gia</h4><p>Đăng ký trong 7 ngày qua</p></div>
            <button class="btn-home" onclick="navigateToUsers()">Xem tất cả <i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">STT</th>
                        <th style="width: 70px; text-align: center;">ID</th>
                        <th style="padding-left: 30px">Học viên</th>
                        <th>Email</th>
                        <th>Cấp độ</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>
`;

    window.onload = function () {
        const role = localStorage.getItem('role');
        const token = localStorage.getItem('token');
        const fullname = localStorage.getItem('fullname') || 'Admin';
        const avatarUrl = localStorage.getItem('avatarUrl');

        if (role !== 'ROLE_ADMIN' || !token) {
            location.href = '/login';
            return;
        }

        document.getElementById('adminName').innerText = fullname;
        document.getElementById('sidebarAdminName').innerText = fullname;

        const sidebarImg = document.getElementById('sidebarAvatar');
        const topbarImg = document.getElementById('adminAvatar');
        const finalPath = getAvatarPath(avatarUrl, fullname);

        sidebarImg.src = finalPath;
        topbarImg.src = finalPath;

        const savedTab = localStorage.getItem('activeAdminTab') || 'dashboard';
        const targetBtn = document.querySelector(`button[onclick*="'${savedTab}'"]`);

        if (targetBtn) {
            loadSection(savedTab, targetBtn);
        } else {
            const firstBtn = document.querySelector('.nav-item');
            loadSection('dashboard', firstBtn);
        }
    };

    function loadSection(section, element, event) {
        if (event) event.preventDefault();
        localStorage.setItem('activeAdminTab', section);

        if (window.innerWidth <= 992) {
            toggleSidebar();
        }
        const mainContent = document.getElementById('main-content');
        const mainTitle = document.getElementById('page-main-title');
        const token = localStorage.getItem('token');

        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        switch (section) {
            case 'dashboard':
                mainTitle.innerText = "Dashboard Tổng Quan";
                mainContent.innerHTML = dashboardTemplate;
                loadDashboardStats(token);
                loadLatestUsers(token);
                break;

            case 'users':
                mainTitle.innerText = "Quản Lý Người Dùng";
                mainContent.innerHTML = `
                <div class="table-section table-users">
                    <div class="table-header">
                    <div class="table-header-left">
                <div class="search-box" style="display:flex; gap:10px; flex-wrap: wrap;">
                    <select id="userFilterLevel" class="form-select" style="width:130px; border-radius:10px;" onchange="loadAllUsersWithFilter(0)">
                        <option value="">Cấp độ	</option>
                        <option value="1">N5</option>
                        <option value="2">N4</option>
                        <option value="3">N3</option>
                        <option value="4">N2</option>
                        <option value="5">N1</option>
                    </select>
                    <select id="userFilterStatus" class="form-select" style="width:160px; border-radius:10px;" onchange="loadAllUsersWithFilter(0)">
                        <option value="">Trạng thái</option>
                        <option value="true">Hoạt động</option>
                        <option value="false">Bị khóa</option>
                    </select>
                    <select id="userFilterTime" class="form-select" style="width:150px; border-radius:10px;" onchange="loadAllUsersWithFilter(0)">
                        <option value="all">Mọi lúc</option>
                        <option value="24h">24 giờ qua</option>
                        <option value="week">Tuần này</option>
                        <option value="month">Tháng này</option>
                        <option value="3months">3 tháng qua</option>
                        <option value="6months">6 tháng qua</option>
                    </select>
                    <input type="text" id="userSearch" class="form-control"
                           placeholder="Tìm tên, username, email..."
                           style="width:280px; border-radius:10px;"
                           oninput="loadAllUsersWithFilter(0)">
                </div>

    try {
        let url = `/api/admin/users/all-paging?page=${page}&size=${pageSize}&search=${encodeURIComponent(search)}&levelId=${levelId}&active=${active}&timeFilter=${timeFilter}`;

        const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();

        const tbody = document.getElementById('fullUserTable');
        const userSection = document.querySelector('.table-users');

        const infoContainer = document.getElementById('paginationInfo');

// Hàm render phân trang riêng cho User (copy logic từ Vocab nhưng đổi tên hàm gọi)
function renderUserPagination(totalPages, currentPage) {
    userTotalPagesGlobal = totalPages;
    const container = document.getElementById('userPagination');
    const infoContainer = document.getElementById('paginationInfo');
    const userSection = document.querySelector('.table-users');
    const paginationRight = userSection ? userSection.querySelector('.pagination-right') : null;

    if (totalPages <= 0) {
        infoContainer.innerHTML = `<span class="pagination-label">Trang</span> <b class="pagination-number">0</b> / <b class="pagination-number">0</b>`;
        if (container) container.innerHTML = '';
        if (paginationRight) paginationRight.style.display = 'none';
        return;
    }

    infoContainer.innerHTML = `<span class="pagination-label">Trang</span> <b class="pagination-number">${currentPage + 1}</b> / <b class="pagination-number">${totalPages}</b>`;

    if (totalPages <= 1) {
        if (container) container.innerHTML = '';
        if (paginationRight) paginationRight.style.display = 'none';
        return;
    }

    // Hiện pagination-right khi có nhiều hơn 1 trang
    if (paginationRight) paginationRight.style.display = 'flex';

    let html = '';
    html += `<button class="pagination-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="loadAllUsersWithFilter(0)"><i class="fas fa-angle-double-left"></i></button>`;
    html += `<button class="pagination-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="loadAllUsersWithFilter(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;

    let start = Math.max(0, currentPage - 2);
    let end = Math.min(totalPages - 1, start + 4);
    if (end - start < 4) start = Math.max(0, end - 4);

    for (let i = start; i <= end; i++) {
        html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="loadAllUsersWithFilter(${i})">${i + 1}</button>`;
    }

    html += `<button class="pagination-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="loadAllUsersWithFilter(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
    html += `<button class="pagination-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="loadAllUsersWithFilter(${totalPages - 1})"><i class="fas fa-angle-double-right"></i></button>`;

    container.innerHTML = html;

    document.getElementById('jumpPageInput').onkeydown = function(e) {
        if (e.key === 'Enter') jumpToUserPage();
    };
}

function jumpToUserPage() {
    const input = document.getElementById('jumpPageInput');
    const pageNum = parseInt(input.value);

    // Lấy tổng số trang từ DOM thay vì dùng biến global
    const infoContainer = document.getElementById('paginationInfo');
    let totalPages = 0;

    if (infoContainer) {
        const text = infoContainer.innerText;
        const match = text.match(/\/(\d+)$/);  // Lấy số sau dấu /
        if (match) {
            totalPages = parseInt(match[1]);
        }
    }

    // Nếu không lấy được từ DOM, fallback sang biến global
    if (totalPages === 0) {
        totalPages = userTotalPagesGlobal;
    }

    if (isNaN(pageNum) || pageNum < 1 || pageNum > totalPages || totalPages === 0) {
        Swal.fire({
            icon: 'warning',
            title: 'Số trang không hợp lệ',
            text: `Vui lòng nhập số từ 1 đến ${totalPages}`,
            timer: 1500,
            showConfirmButton: false
        });
        input.value = '';
        return;
    }
    loadAllUsersWithFilter(pageNum - 1);
    input.value = '';
}

    async function submitCategory() {
        const name = document.getElementById('catName').value.trim();
        const level = document.getElementById('catLevel').value;
        const iconUrl = document.getElementById('catIconUrl').value.trim();
        const token = localStorage.getItem('token');



        if (!name) {
            return Swal.fire('Lỗi', 'Vui lòng nhập tên chủ đề!', 'error');
        }

try {
        const response = await fetch('/api/admin/categories', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                categoryName: name,
                jlptLevel: level,
                iconUrl: iconUrl,
                is_active: 1, // Mặc định cho chủ đề mới
                totalLessons: 0,
                progress: 0
            })
        });

        if (response.ok) {
            // Đóng Modal bằng Bootstrap API
            const modalElement = document.getElementById('categoryModal');
            const modalInstance = bootstrap.Modal.getInstance(modalElement);
            if (modalInstance) modalInstance.hide();

            // Thông báo thành công
            await Swal.fire({
                icon: 'success',
                title: 'Thành công!',
                text: 'Chủ đề mới đã được lưu vào hệ thống.',
                showConfirmButton: false,
                timer: 1500
            });

            // LÀM MỚI DỮ LIỆU: Gọi lại hàm load danh sách
            loadAllCategories(token);
        } else {
            const errorText = await response.text();
            Swal.fire('Thất bại', 'Lỗi: ' + errorText, 'error');
        }
    } catch (error) {
        console.error("Error submitting category:", error);
        Swal.fire('Lỗi kết nối', 'Không thể kết nối tới máy chủ!', 'error');
    }
}

    async function loadVocabWithPagination(page) {
    const token = localStorage.getItem('token');
    const search = document.getElementById('vocabSearch')?.value || "";
    const lessonId = document.getElementById('filterLesson')?.value || "";
    const cateId = document.getElementById('filterCate')?.value || "";
    const level = document.getElementById('filterLevel')?.value || "";
    const pageSize = 20;
    try {
        let url = `/api/admin/vocab/all?page=${page}&size=${pageSize}&search=${encodeURIComponent(search)}&cateId=${cateId}&level=${level}`;
        const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();

        const tbody = document.getElementById('vocabTableBody');
        const vocabSection = document.querySelector('.table-vocab');
        const paginationContainer = document.getElementById('vocabPagination');
        const paginationRight = vocabSection ? vocabSection.querySelector('.pagination-right') : null;
        const infoContainer = document.getElementById('paginationInfo');

        if (!data.content || data.content.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5 text-muted">Không tìm thấy từ vựng nào</td></tr>`;

            // Ẩn cả pagination-center và pagination-right khi không có dữ liệu
            if (paginationContainer) paginationContainer.innerHTML = '';
            if (paginationRight) paginationRight.style.display = 'none';
            if (infoContainer) infoContainer.innerHTML = 'Trang 0 / 0';
            return;
        }

        // Hiện lại pagination-right nếu có dữ liệu
        if (paginationRight) paginationRight.style.display = 'flex';

        tbody.innerHTML = data.content.map((v, index) => `
            <tr>
                <td style="text-align:center; font-size: 13px;">${(page * pageSize) + index + 1}</td>
                <td style="text-align:center; font-size: 13px;"><span class="id-badge">#${v.id}</span></td>
                <td><strong style="font-size: 18px; color: var(--text-dark);">${v.expression}</strong></td>
                <td><span style="color: var(--teal); font-weight: 600;">${v.kana}</span></td>
                <td><small style="font-size: 15px;">${v.romaji}</small></td>
                <td>${v.meaning}</td>
                <td style="text-align:center;">
                    <button class="btn-action btn-edit me-1" title="Sửa" onclick="editVocab(${v.id})">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn-action btn-trash" title="Xóa" onclick="deleteVocab(${v.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>`).join('');
        renderPagination(data.totalPages, data.number);
    } catch (e) {
        console.error(e);
        document.getElementById('vocabTableBody').innerHTML = `<tr><td colspan="8" class="text-center text-danger">Lỗi nạp dữ liệu</td></tr>`;
    }
}

    // 1. Hàm load danh sách Chủ đề khi chọn Level
    async function updateCategoryFilter() {
        const token = localStorage.getItem('token');
        const level = document.getElementById('filterLevel').value;

                cateSelect.innerHTML = options;
            }
        } catch (e) { console.error(e); }

let totalPagesGlobal = 0;

function renderPagination(totalPages, currentPage) {
    totalPagesGlobal = totalPages;
    const container = document.getElementById('vocabPagination');
    const infoContainer = document.getElementById('paginationInfo');
    const vocabSection = document.querySelector('.table-vocab');
    const paginationRight = vocabSection ? vocabSection.querySelector('.pagination-right') : null;

    if (totalPages <= 0) {
        infoContainer.innerHTML = `<span class="pagination-label">Trang</span> <b class="pagination-number">0</b> / <b class="pagination-number">0</b>`;
        if (container) container.innerHTML = '';
        if (paginationRight) paginationRight.style.display = 'none';
        return;
    }

    infoContainer.innerHTML = `<span class="pagination-label">Trang</span> <b class="pagination-number">${currentPage + 1}</b> / <b class="pagination-number">${totalPages}</b>`;

    if (totalPages <= 1) {
        if (container) container.innerHTML = '';
        if (paginationRight) paginationRight.style.display = 'none';
        return;
    }

    // Hiện pagination-right khi có nhiều hơn 1 trang
    if (paginationRight) paginationRight.style.display = 'flex';

    let html = '';
    html += `<button class="pagination-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="loadVocabWithPagination(0)" title="Trang đầu"><i class="fas fa-angle-double-left"></i></button>`;
    html += `<button class="pagination-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="loadVocabWithPagination(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;

    let startPage = Math.max(0, currentPage - 2);
    let endPage = Math.min(totalPages - 1, startPage + 4);

    if (endPage - startPage < 4) {
        startPage = Math.max(0, endPage - 4);
    }

    if (startPage > 0) {
        html += `<span class="pagination-dots">...</span>`;
    }

    for (let i = startPage; i <= endPage; i++) {
        html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="loadVocabWithPagination(${i})">${i + 1}</button>`;
    }

    if (endPage < totalPages - 1) {
        html += `<span class="pagination-dots">...</span>`;
    }

    html += `<button class="pagination-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="loadVocabWithPagination(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
    html += `<button class="pagination-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="loadVocabWithPagination(${totalPages - 1})" title="Trang cuối"><i class="fas fa-angle-double-right"></i></button>`;

    container.innerHTML = `<div class="pagination-container">${html}</div>`;

    // Lắng nghe sự kiện Enter cho ô nhập số trang
    const jumpInput = document.getElementById('jumpPageInput');
    if (jumpInput) {
        // Remove old event listener by cloning and replacing
        const newJumpInput = jumpInput.cloneNode(true);
        jumpInput.parentNode.replaceChild(newJumpInput, jumpInput);

        newJumpInput.onkeydown = function(e) {
            if (e.key === 'Enter') jumpToPage();
        };
    }
}

    function jumpToPage() {
    const input = document.getElementById('jumpPageInput');
    const pageNum = parseInt(input.value);

    // Lấy tổng số trang từ DOM thay vì dùng biến global
    const infoContainer = document.getElementById('paginationInfo');
    let totalPages = 0;

    if (infoContainer) {
        const text = infoContainer.innerText;
        const match = text.match(/\/(\d+)$/);  // Lấy số sau dấu /
        if (match) {
            totalPages = parseInt(match[1]);
        }
    }

    // Nếu không lấy được từ DOM, fallback sang biến global
    if (totalPages === 0) {
        totalPages = totalPagesGlobal;
    }

    if (isNaN(pageNum) || pageNum < 1 || pageNum > totalPages || totalPages === 0) {
        Swal.fire({
            icon: 'warning',
            title: 'Số trang không hợp lệ',
            text: `Vui lòng nhập số từ 1 đến ${totalPages}`,
            timer: 1500,
            showConfirmButton: false
        });
        input.value = '';
        return;
    }
    loadVocabWithPagination(pageNum - 1);
    input.value = '';
}

    async function submitVocab() {
        const token = localStorage.getItem('token');
        const data = {
            expression: document.getElementById('vExpression').value,
            kana: document.getElementById('vKana').value,
            romaji: document.getElementById('vRomaji').value,
            meaning: document.getElementById('vMeaning').value,
            wordType: document.getElementById('vWordType').value,
            example: document.getElementById('vExample').value,
            exampleVi: document.getElementById('vExampleVi').value,
            imageUrl: document.getElementById('vImageUrl').value,
            audioUrl: document.getElementById('vAudioUrl').value,
            lessonId: document.getElementById('vLessonId').value // Quan trọng để map bài học
        };

        if (!data.expression || !data.meaning || !data.lessonId) {
            return Swal.fire('Chú ý', 'Vui lòng điền các trường bắt buộc!', 'warning');
        }

        try {
            const res = await fetch('/api/admin/vocab/add', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },

            });

                Swal.fire('Lỗi', 'Không thể lưu từ vựng', 'error');

    let selectedFile = null; // Biến tạm để giữ file ảnh

    // 1. Hàm xử lý khi chọn file từ máy tính
    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];

            const reader = new FileReader();
            reader.onload = function (e) {
                const previewImg = document.getElementById('previewImg');
                const previewDiv = document.getElementById('iconPreview');

                previewImg.src = e.target.result;
                previewDiv.style.display = 'block'; // Hiện khung ảnh to

                // Hiển thị tên file vào ô input
                document.getElementById('catIconUrl').value = selectedFile.name;
            };
            reader.readAsDataURL(selectedFile);
        }
    }


    // 2. Hàm cập nhật preview khi nhập link thủ công (vẫn giữ nếu bạn muốn nhập link ngoài)
    function updatePreview(url) {
        selectedFile = null; // Nếu nhập link tay thì xóa file đã chọn (nếu có)
        const previewDiv = document.getElementById('iconPreview');
        const previewImg = document.getElementById('previewImg');
        if (url) {
            previewImg.src = url.startsWith('http') ? url : '/' + url;
            previewDiv.style.display = 'block';
        }
    }

    // 3. Hàm Submit gộp (Gửi cả Text và File)
    async function submitCategory() {
        const name = document.getElementById('catName').value.trim();
        const level = document.getElementById('catLevel').value;
        const token = localStorage.getItem('token');

        if (!name) return Swal.fire('Lỗi', 'Vui lòng nhập tên chủ đề!', 'error');

        // Dùng FormData để gửi cả file và text
        const formData = new FormData();
        formData.append("categoryName", name);
        formData.append("jlptLevel", level);

        // Nếu có chọn file thì gửi file, nếu không thì gửi link nhập tay (nếu có)
        if (selectedFile) {
            formData.append("file", selectedFile);
        } else {
            formData.append("iconUrl", document.getElementById('catIconUrl').value);
        }

        try {
            Swal.fire({ title: 'Đang xử lý...', didOpen: () => Swal.showLoading() });

            const response = await fetch('/api/admin/categories/add-with-file', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData // Không set Content-Type, trình duyệt tự xử lý Multipart
            });

            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
                await Swal.fire('Thành công', 'Chủ đề và ảnh đã được lưu!', 'success');
                selectedFile = null; // Reset biến tạm
                loadAllCategories(token);
            } else {
                Swal.fire('Lỗi', 'Không thể lưu chủ đề', 'error');
            }
        } catch (e) { console.error(e); }
    }

    async function deleteCategory(id) {
        // Tìm trong danh sách hiện tại để biết nó đang ẩn hay hiện (nâng cao)
        // Hoặc đơn giản là dùng thông báo chung:
        const result = await Swal.fire({
            title: 'Xác nhận thay đổi?',
            text: "Hành động này sẽ thay đổi trạng thái hiển thị của chủ đề đối với người dùng.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#06BBCC',
            cancelButtonColor: '#ef4444',
            confirmButtonText: 'Đồng ý',
            cancelButtonText: 'Hủy'
        });

        if (result.isConfirmed) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/admin/categories/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.ok) {
                    const message = await res.text();
                    await Swal.fire({
                        icon: 'success',
                        title: 'Thành công',
                        text: message,
                        timer: 1000,
                        showConfirmButton: false
                    });
                    loadAllCategories(token);
                }
            } catch (e) { console.error(e); }
        }
    }
