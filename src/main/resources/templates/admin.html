<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='Hệ thống quản trị - Ganbatte')}">
</head>
<link th:href="@{/css/admin.css}" rel="stylesheet">

<body>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar">
    <a th:href="@{/}" class="sidebar-logo">
        <img th:src="@{/img/icons.png}" alt="Logo">
        <div class="logo-text">
            <span class="gan">Gan</span><span class="batte">batte</span>
        </div>
    </a>

    <div class="sidebar-section-label">Tổng quan</div>
    <nav class="sidebar-nav">
        <button class="nav-item active" onclick="loadSection('dashboard', this, event)">
            <div class="nav-icon"><i class="fas fa-chart-pie"></i></div>
            <span class="nav-label">Thống kê</span>
        </button>
        <button class="nav-item" onclick="loadSection('users', this, event)">
            <div class="nav-icon"><i class="fas fa-user-friends"></i></div>
            <span class="nav-label">Người dùng</span>
        </button>
    </nav>

    <div class="sidebar-section-label">Nội dung</div>
    <nav class="sidebar-nav">
        <button class="nav-item" onclick="loadSection('categories', this, event)">
            <div class="nav-icon"><i class="fas fa-th-large"></i></div>
            <span class="nav-label">Chủ đề</span>
        </button>
        <button class="nav-item" onclick="loadSection('lessons', this, event)">
            <div class="nav-icon"><i class="fas fa-book-reader"></i></div>
            <span class="nav-label">Bài học</span>
        </button>
        <button class="nav-item" onclick="loadSection('vocabulary', this, event)">
            <div class="nav-icon"><i class="fas fa-spell-check"></i></div>
            <span class="nav-label">Từ vựng</span>
        </button>
    </nav>

    <div class="sidebar-footer">
        <div class="user-mini">
            <img id="sidebarAvatar" src="" alt="Admin">
            <div class="user-mini-info">
                <p id="sidebarAdminName">Admin</p>
                <span>Trực tuyến</span>
            </div>
        </div>
    </div>
</aside>

<div class="main">
    <header class="topbar">
        <div class="topbar-left" style="display: flex; align-items: center;">
            <button class="mobile-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <h4 id="page-main-title">Dashboard Tổng Quan</h4>
        </div>
        <div class="topbar-right">
            <a th:href="@{/}" class="btn-home">
                <i class="fas fa-home"></i> <span>Trang chủ</span>
            </a>
            <div class="topbar-divider"></div>
            <div class="dropdown">
                <div class="admin-profile" data-bs-toggle="dropdown" style="cursor:pointer;">
                    <img id="adminAvatar" src="" width="40" height="40">
                    <div class="admin-info">
                        <p id="adminName">Admin</p>
                        <span>Trực tuyến</span>
                    </div>
                    <i class="fas fa-chevron-down"
                       style="font-size: 11px; color: var(--text-muted); margin-left: 4px;"></i>
                </div>
                <ul class="dropdown-menu dropdown-menu-end mt-3">
                    <li><a class="dropdown-item" href="/profile"><i class="fa fa-id-card me-2 text-primary"></i>Hồ
                        sơ</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item text-danger fw-bold" href="#" onclick="logout()"><i
                            class="fa fa-sign-out-alt me-2"></i>Đăng xuất</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main class="content" id="main-content">
    </main>
</div>
<!--aria-hidden="true"-->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content"
             style="border-radius: 20px; border: none; box-shadow: 0 15px 50px rgba(0,0,0,0.2);">
            <div class="modal-header" style="border-bottom: 1px solid #eee; padding: 20px 25px;">
                <h5 class="modal-title" style="font-weight: 700; color: var(--text-dark);">
                    <i class="fas fa-folder-plus me-2" style="color: var(--teal);"></i>Thêm chủ đề mới
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 25px;">
                <form id="categoryForm">
                    <div class="mb-3">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Tên chủ đề</label>
                        <input type="text" id="catName" class="form-control"
                               placeholder="Ví dụ: Gia đình, Động vật..."
                               style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Avatar</label>

                        <div class="input-group">
                                <span class="input-group-text"
                                      style="border-radius: 10px 0 0 10px; background: #f8f9fa;">
                                    <i class="fas fa-image"></i>
                                </span>
                            <input type="text" id="catIconUrl" class="form-control" placeholder="Chưa chọn ảnh..."
                                   readonly style="cusor: default; padding: 12px; border: 1px solid #ddd;">

                            <button class="btn btn-orange" type="button"
                                    onclick="document.getElementById('fileInput').click()"
                                    style="border-radius: 0 10px 10px 0; color: white; font-weight: 600;">
                                <i class="fas fa-upload me-1"></i> Chọn ảnh
                            </button>
                            <input type="file" id="fileInput" style="display: none;" accept="image/*"
                                   onchange="handleFileSelect(this)">
                        </div>

                        <div id="iconPreview" class="mb-3 text-center" style="display:none;">
                            <div style="position: relative; display: inline-block;">
                                <img src="" id="previewImg"
                                     style="width: 200px; height: 200px; object-fit: cover; border-radius: 15px; padding: 5px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">

                            </div>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Cấp độ JLPT</label>
                        <select id="catLevel" class="form-select"
                                style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;">
                            <option value="N5">N5 (Cơ bản)</option>
                            <option value="N4">N4 (Sơ cấp)</option>
                            <option value="N3">N3 (Trung cấp)</option>
                            <option value="N2">N2 (Thượng cấp)</option>
                            <option value="N1">N1 (Cao cấp)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-top: none; padding: 0 25px 25px;">
                <button type="button" class="btn-custom btn-red" data-bs-dismiss="modal"
                        style="font-weight: 600; color: #fff;">Hủy
                </button>
                <button type="button" class="btn-custom btn-teal" onclick="submitCategory()">
                    <i class="fas fa-save me-2"></i>Lưu chủ đề
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="lessonModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content"
             style="border-radius: 20px; border: none; box-shadow: 0 15px 50px rgba(0,0,0,0.2);">
            <div class="modal-header" style="border-bottom: 1px solid #eee; padding: 20px 25px;">
                <h5 class="modal-title" style="font-weight: 700; color: var(--text-dark);">
                    <i class="fas fa-book-open me-2" style="color: #06BBCC;"></i>Thêm bài học mới
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 25px;">
                <form id="lessonForm">
                    <div class="mb-4">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Tên bài học</label>
                        <input type="text" id="lessonName" class="form-control" placeholder="Ví dụ: Bài 1: Chào hỏi"
                               style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label" style="font-weight: 600; font-size: 14px;">Chủ đề</label>
                        <select id="lessonCategorySelect" class="form-select"
                                style="border-radius: 10px; padding: 12px; border: 1px solid #ddd;">
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-top: none; padding: 0 25px 25px;">
                <button type="button" class="btn-custom btn-red" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn-custom btn-teal" onclick="submitLesson()">
                    <i class="fas fa-save me-2"></i>Lưu bài học
                </button>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="vocabModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="fas fa-spell-check me-2"
                                                   style="color: var(--teal);"></i>Thêm
                    từ vựng mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 20px;">
                <form id="vocabForm">
                    <div class="row">
                        <div class="col-md-6 border-end">
                            <div class="mb-3">
                                <label class="form-label fw-600">Từ vựng (Kanji/Gốc)</label>
                                <input type="text" id="vExpression" class="form-control" placeholder="VD: 食べる"
                                       required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Cách đọc (Kana)</label>
                                <input type="text" id="vKana" class="form-control" placeholder="VD: たべる" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Romaji</label>
                                <input type="text" id="vRomaji" class="form-control" placeholder="VD: taberu">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Ý nghĩa (Tiếng Việt)</label>
                                <input type="text" id="vMeaning" class="form-control" placeholder="VD: Ăn" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Loại từ</label>
                                <select id="vWordType" class="form-select">
                                    <option value="Danh từ">Danh từ</option>
                                    <option value="Động từ">Động từ</option>
                                    <option value="Tính từ">Tính từ</option>
                                    <option value="Trạng từ">Trạng từ</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label fw-600">Chọn Chủ đề</label>
                                <select id="vCategoryId" class="form-select" onchange="onVocabCategoryChange()">
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Chọn Bài học</label>
                                <div id="lessonSelectContainer">
                                    <select id="vLessonId" class="form-select" required
                                            style="border: 2px solid var(--teal);">
                                        <option value="">-- Chọn bài học --</option>
                                    </select>
                                </div>
                                <div id="quickAddLessonContainer" class="mt-2" style="display: none;">
                                    <p class="text-danger small mb-1"><i class="fas fa-exclamation-circle"></i> Chủ
                                        đề
                                        này chưa có bài học!</p>
                                    <button type="button" class="btn btn-sm btn-outline-primary w-100"
                                            onclick="openQuickAddLesson()">
                                        <i class="fas fa-plus"></i> Tạo bài học mới cho chủ đề này
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Câu ví dụ (Nhật)</label>
                                <textarea id="vExample" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Dịch ví dụ (Việt)</label>
                                <textarea id="vExampleVi" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">URL Ảnh / Audio (Tùy chọn)</label>
                                <input type="text" id="vImageUrl" class="form-control mb-2" placeholder="Link ảnh">
                                <input type="text" id="vAudioUrl" class="form-control" placeholder="Link audio">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-custom btn-red" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn-custom btn-teal" onclick="submitVocab()">Lưu từ vựng</button>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="userViewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <div class="modal-header"
                 style="background-color: #f8f9fa; border-radius: 20px 20px 0 0; border-bottom: 1px solid #eee;">
                <h5 class="modal-title fw-bold"><i class="fas fa-user-circle me-2" style="color: var(--teal);"></i>Chi
                    tiết học viên</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div class="text-center mb-4">
                    <img id="viewUserAvatar" src="" class="rounded-circle shadow-sm"
                         style="width: 100px; height: 100px; object-fit: cover; border: 4px solid #fff; background: #eee;">
                    <h5 id="viewFullnameTitle" class="mt-3 fw-bold mb-1"></h5>
                    <div id="viewUserStatusBadge"></div>
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label small text-muted fw-bold">Mã học viên (ID)</label>
                        <input type="text" id="viewId" class="form-control bg-light border-0"
                               style="border-radius: 8px;" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-muted fw-bold">Tên đăng nhập</label>
                        <input type="text" id="viewUsername" class="form-control bg-light border-0"
                               style="border-radius: 8px;" readonly>
                    </div>

                    <div class="col-12">
                        <label class="form-label small text-muted fw-bold">Địa chỉ Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="text" id="viewEmail" class="form-control bg-light border-0" readonly>
                        </div>
                    </div>

                    <div class="col-6">
                        <label class="form-label small text-muted fw-bold">Trình độ JLPT</label>
                        <input type="text" id="viewLevel" class="form-control bg-light border-0"
                               style="border-radius: 8px;" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-muted fw-bold">Tổng điểm tích lũy</label>
                        <input type="text" id="viewPoints" class="form-control bg-light border-0"
                               style="border-radius: 8px; font-weight: bold; color: var(--teal);" readonly>
                    </div>

                    <div class="col-12">
                        <label class="form-label small text-muted fw-bold">Ngày tham gia hệ thống</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i
                                    class="fas fa-calendar-alt text-muted"></i></span>
                            <input type="text" id="viewCreated" class="form-control bg-light border-0" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="border-top: none; padding-top: 0;">
                <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal"
                        style="border-radius: 10px; font-weight: 600;">Đóng thông tin
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:inline="javascript">
    // HÀM TIỆN ÍCH
    function getAvatarPath(url, fullname) {
        const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(fullname)}&background=06BBCC&color=fff`;
        if (!url) return defaultAvatar;
        let path = (url.startsWith('img/') || url.startsWith('http')) ? url : `img/avatar/${url}`;
        return `${path}?v=${new Date().getTime()}`;
    }

    function toggleSidebar() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    const dashboardTemplate = `
    <div class="breadcrumb-bar">
        <div class="chip active"><i class="fas fa-chart-pie" style="margin-right:5px; font-size:10px;"></i>Thống kê</div>
        <span class="sep">›</span><div class="chip">Dashboard</div>
    </div>
    <div class="stats-grid">
        <div class="stat-card teal">
            <div class="stat-top"><div class="stat-icon teal"><i class="fas fa-users"></i></div></div>
            <div class="stat-value" id="totalUsers">0</div><div class="stat-label">Tổng Học Viên</div>
        </div>
        <div class="stat-card red">
            <div class="stat-top"><div class="stat-icon red"><i class="fas fa-th-large"></i></div></div>
            <div class="stat-value" id="totalCategories">0</div><div class="stat-label">Tổng Chủ Đề</div>
        </div>
        <div class="stat-card green">
            <div class="stat-top"><div class="stat-icon green"><i class="fas fa-book"></i></div></div>
            <div class="stat-value" id="totalLessons">0</div><div class="stat-label">Tổng Bài Học</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-top"><div class="stat-icon orange"><i class="fas fa-language"></i></div></div>
            <div class="stat-value" id="totalVocab">0</div><div class="stat-label">Kho Từ Vựng</div>
        </div>
    </div>
    <div class="table-section">
        <div class="table-header">
            <div class="table-header-left"><h4>Học viên mới tham gia</h4><p>Đăng ký trong 7 ngày qua</p></div>
            <button class="btn-home" onclick="navigateToUsers()">Xem tất cả <i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">STT</th>
                        <th style="width: 70px; text-align: center;">ID</th>
                        <th style="padding-left: 30px">Học viên</th>
                        <th>Email</th>
                        <th style="text-align: center;">Cấp độ</th>
                        <th style="text-align: center;">Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>
`;

    window.onload = function () {
        const role = localStorage.getItem('role');
        const token = localStorage.getItem('token');
        const fullname = localStorage.getItem('fullname') || 'Admin';
        const avatarUrl = localStorage.getItem('avatarUrl');

        initPaginationManagers();

        if (role !== 'ROLE_ADMIN' || !token) {
            location.href = '/login';
            return;
        }

        document.getElementById('adminName').innerText = fullname;
        document.getElementById('sidebarAdminName').innerText = fullname;

        const sidebarImg = document.getElementById('sidebarAvatar');
        const topbarImg = document.getElementById('adminAvatar');
        const finalPath = getAvatarPath(avatarUrl, fullname);

        sidebarImg.src = finalPath;
        topbarImg.src = finalPath;

        const savedTab = localStorage.getItem('activeAdminTab') || 'dashboard';
        const targetBtn = document.querySelector(`button[onclick*="'${savedTab}'"]`);

        if (targetBtn) {
            loadSection(savedTab, targetBtn);
        } else {
            const firstBtn = document.querySelector('.nav-item');
            loadSection('dashboard', firstBtn);
        }
    };

    function loadSection(section, element, event) {
        if (event) event.preventDefault();
        localStorage.setItem('activeAdminTab', section);

        if (window.innerWidth <= 992) {
            toggleSidebar();
        }
        const mainContent = document.getElementById('main-content');
        const mainTitle = document.getElementById('page-main-title');
        const token = localStorage.getItem('token');

        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        switch (section) {
            case 'dashboard':
                mainTitle.innerText = "Dashboard Tổng Quan";
                mainContent.innerHTML = dashboardTemplate;
                loadDashboardStats(token);
                loadLatestUsers(token);
                break;

            case 'users':
                mainTitle.innerText = "Quản Lý Người Dùng";
                mainContent.innerHTML = `
                <div class="table-section table-users">
                    <div class="table-header">
                    <div class="table-header-left">
                <div class="search-box" style="display:flex; gap:10px; flex-wrap: wrap;">
                    <select id="userFilterLevel" class="form-select" style="width:130px; border-radius:10px;" onchange="loadAllUsersWithFilter(0)">
                        <option value="">Cấp độ	</option>
                        <option value="1">N5</option>
                        <option value="2">N4</option>
                        <option value="3">N3</option>
                        <option value="4">N2</option>
                        <option value="5">N1</option>
                    </select>
                    <select id="userFilterStatus" class="form-select" style="width:160px; border-radius:10px;" onchange="loadAllUsersWithFilter(0)">
                        <option value="">Trạng thái</option>
                        <option value="true">Hoạt động</option>
                        <option value="false">Bị khóa</option>
                    </select>
                    <select id="userFilterTime" class="form-select" style="width:150px; border-radius:10px;" onchange="loadAllUsersWithFilter(0)">
                        <option value="all">Mọi lúc</option>
                        <option value="24h">24 giờ qua</option>
                        <option value="week">Tuần này</option>
                        <option value="month">Tháng này</option>
                        <option value="3months">3 tháng qua</option>
                        <option value="6months">6 tháng qua</option>
                    </select>
                    <input type="text" id="userSearch" class="form-control"
                           placeholder="Tìm tên, username, email..."
                           style="width:260px; border-radius:10px;"
                           oninput="loadAllUsersWithFilter(0)">
                </div>

    const token = localStorage.getItem('token');

    const active = document.getElementById('userFilterStatus')?.value || "";

    async function viewUser(id) {
    const token = localStorage.getItem('token');
    try {
        const res = await fetch(`/api/admin/users/${id}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const user = await res.json();

        // 1. Ảnh và tiêu đề
        document.getElementById('viewUserAvatar').src = getAvatarPath(user.avatarUrl, user.fullname);
        document.getElementById('viewFullnameTitle').innerText = user.fullname;

        // 2. Tách ID và Username
        document.getElementById('viewId').value = `#${user.id}`;
        document.getElementById('viewUsername').value = user.userName;

        // 3. Các thông tin khác
        document.getElementById('viewEmail').value = user.email || 'Chưa cập nhật';
        document.getElementById('viewLevel').value = getLevelName(user.levelId);
        document.getElementById('viewPoints').value = `${user.totalPoints || 0} điểm`;

        // 4. Định dạng ngày tháng (Ví dụ: 08/04/2026)
        const date = new Date(user.created);
        document.getElementById('viewCreated').value = date.toLocaleDateString('vi-VN');

        // 5. Trạng thái Badge
        const badgeContainer = document.getElementById('viewUserStatusBadge');
        if (user.active) {
            badgeContainer.innerHTML = '<span class="badge bg-success"><i class="fas fa-check-circle me-1"></i>Đang hoạt động</span>';
        } else {
            badgeContainer.innerHTML = '<span class="badge bg-danger"><i class="fas fa-lock me-1"></i>Đã bị khóa</span>';
        }

        // Mở Modal
        new bootstrap.Modal(document.getElementById('userViewModal')).show();
    } catch (e) {
        console.error(e);
        Swal.fire('Lỗi', 'Không thể lấy thông tin chi tiết học viên', 'error');
    }
}

    async function loadAllCategoriesWithPagination(page = 0) {
    const token = localStorage.getItem('token');
    const search = document.getElementById('categorySearch')?.value || "";
    const level = document.getElementById('categoryFilterLevel')?.value || "";
    const isActive = document.getElementById('categoryFilterStatus')?.value || "";
    const pageSize = 5;

    try {
        let url = `/api/admin/categories/paging?page=${page}&size=${pageSize}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (level) url += `&level=${level}`;
        if (isActive !== "") url += `&isActive=${isActive}`;

        const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });

        if (!res.ok) {
            throw new Error('Network response was not ok');
        }

        const data = await res.json();
        const tbody = document.getElementById('categoryTableBody');

        const countBadge = document.getElementById('categoryCountBadge');
        if (countBadge) {
            countBadge.innerText = `${data.totalElements || 0} chủ đề`;
        }

        if (!data.content || data.content.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">Không tìm thấy chủ đề nào</td</tr>`;
            if (paginationManager['categoryPagination']) {
                paginationManager['categoryPagination'].reset();
            }
            return;
        }

        tbody.innerHTML = data.content.map((cat, index) => {
            const isHidden = cat.isActive === false;
            const rowClass = isHidden ? 'row-hidden' : '';
            const statusBadge = isHidden ? '<span class="status-badge badge-hidden">Đã ẩn</span>' : '';
            const actionBtn = isHidden
                ? `<button class="btn-action btn-restore me-1" title="Khôi phục" onclick="deleteCategory(${cat.id})"><i class="fas fa-trash-restore"></i></button>`
                : `<button class="btn-action btn-trash me-1" title="Ẩn" onclick="deleteCategory(${cat.id})"><i class="fas fa-trash"></i></button>`;

            return `
            <tr class="${rowClass}">
                <td style="text-align: center;">${(page * pageSize) + index + 1}</td>
                <td style="text-align: center;"><span class="id-badge">#${cat.id}</span></td>
                <td style="padding-left: 40px;">
                    <div class="d-flex align-items-center gap-2">
                        ${cat.iconUrl ? `<img src="${cat.iconUrl}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 8px;">` : ''}
                        <strong style="color:var(--teal-dark)">${cat.categoryName}</strong>
                    </div>
                    <div class="mt-1">${statusBadge}</div>
                </td>
                <td style="text-align: center;">${cat.totalLessons || 0} bài</td>
                <td style="text-align: center;"><span class="level-badge">${cat.jlptLevel || 'N5'}</span></td>
                <td style="text-align: center;">
                    <button class="btn-action btn-edit me-1" title="Sửa" onclick="editCategory(${cat.id})"><i class="fas fa-edit"></i></button>
                    ${actionBtn}
                </td>
            </tr>`;
        }).join('');

        // Render pagination
        if (paginationManager['categoryPagination']) {
            paginationManager['categoryPagination'].render(data.totalPages, data.number);
        }
    } catch (e) {
        console.error("Lỗi tải chủ đề:", e);
        document.getElementById('categoryTableBody').innerHTML = `<tr><td colspan="6" class="text-center text-danger">Lỗi nạp dữ liệu</td</tr>`;
    }
}

        if (!res.ok) return;

        const start = page * pageSize;
        const end = start + pageSize;
        const pageData = categories.slice(start, end);

        const tbody = document.getElementById('categoryTableBody');

        if (pageData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">Chưa có chủ đề nào</td></tr>`;
            if (paginationManager['categoryPagination']) {
                paginationManager['categoryPagination'].reset();
            }
            return;
        }

        tbody.innerHTML = pageData.map((cat, index) => {
            const isHidden = cat.isActive === false;
            const rowClass = isHidden ? 'row-hidden' : '';
            const statusBadge = isHidden ? '<span class="status-badge badge-hidden">Đã ẩn</span>' : '';
            const actionBtn = isHidden
                ? `<button class="btn-action btn-restore me-1" title="Khôi phục" onclick="deleteCategory(${cat.id})"><i class="fas fa-trash-restore"></i></button>`
                : `<button class="btn-action btn-trash me-1" title="Ẩn" onclick="deleteCategory(${cat.id})"><i class="fas fa-trash"></i></button>`;

            return `
            <tr class="${rowClass}">
                <td style="text-align: center;">${start + index + 1}</td>

    async function loadAllLessonsWithPagination(page = 0) {
    const token = localStorage.getItem('token');
    const search = document.getElementById('lessonSearch')?.value || "";
    const categoryId = document.getElementById('lessonFilterCategory')?.value || "";
    const level = document.getElementById('lessonFilterLevel')?.value || "";
    const pageSize = 10;

    try {
        let url = `/api/admin/lessons/paging?page=${page}&size=${pageSize}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (categoryId) url += `&categoryId=${categoryId}`;
        if (level) url += `&level=${level}`;

        const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });

        if (!res.ok) {
            throw new Error('Network response was not ok');
        }

        const data = await res.json();
        const tbody = document.getElementById('lessonTableBody');

        const countBadge = document.getElementById('lessonCountBadge');
        if (countBadge) {
            countBadge.innerText = `${data.totalElements || 0} bài học`;
        }

        if (!data.content || data.content.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">Không tìm thấy bài học nào</td</tr>`;
            if (paginationManager['lessonPagination']) {
                paginationManager['lessonPagination'].reset();
            }
            return;
        }

        tbody.innerHTML = data.content.map((les, index) => {
            // Tính tổng số từ vựng (nếu có trong response)
            const totalVocab = les.totalVocab || 0;
            const lessonName = les.lessonName || '';
            const categoryName = les.categoryName || 'Chưa phân loại';
            return `
            <tr>
        <td style="text-align: center;">${(page * pageSize) + index + 1}</td>
        <td style="text-align: center;"><span class="id-badge">#${les.id}</span></td>
        <td><strong>${lessonName}</strong></td>

        <td style="text-align: center;"><span class="level-badge">${totalVocab} từ</span></td>
        <td style="text-align: center;">

                <i class="fas fa-edit"></i>
            </button>
            <button class="btn-action btn-trash" title="Xóa" onclick="deleteLesson(${les.id})">
                <i class="fas fa-trash"></i>
            </button>
        </td>
    </tr>
            `;
        }).join('');

        // Render pagination
        if (paginationManager['lessonPagination']) {
            paginationManager['lessonPagination'].render(data.totalPages, data.number);
        }
    } catch (e) {
        console.error("Lỗi tải bài học:", e);
        document.getElementById('lessonTableBody').innerHTML = `<tr><td colspan="6" class="text-center text-danger">Lỗi nạp dữ liệu</td</tr>`;

        if (!name) return Swal.fire('Lỗi', 'Vui lòng nhập tên chủ đề!', 'error');

    // ==================== HỆ THỐNG PHÂN TRANG DÙNG CHUNG ====================

class PaginationManager {
    constructor(config) {
        this.containerId = config.containerId;      // ID của container chứa pagination (vd: 'userPagination', 'vocabPagination')
        this.infoContainerId = config.infoContainerId; // ID của container hiển thị thông tin trang (thường là 'paginationInfo')
        this.parentSelector = config.parentSelector;   // Selector của section cha (vd: '.table-users', '.table-vocab')
        this.loadFunction = config.loadFunction;       // Hàm load dữ liệu (vd: loadAllUsersWithFilter, loadVocabWithPagination)
        this.pageSize = config.pageSize || 10;         // Số item mỗi trang
        this.currentPage = 0;
        this.totalPages = 0;
    }

    // Hiển thị phân trang
    render(totalPages, currentPage) {
        this.totalPages = totalPages;
        this.currentPage = currentPage;

        const container = document.getElementById(this.containerId);
        const infoContainer = document.getElementById(this.infoContainerId);
        const parentSection = document.querySelector(this.parentSelector);
        const paginationRight = parentSection ? parentSection.querySelector('.pagination-right') : null;

        // Cập nhật thông tin trang
        if (infoContainer) {
            if (totalPages <= 0) {
                infoContainer.innerHTML = `<span class="pagination-label">Trang</span> <b class="pagination-number">0</b> / <b class="pagination-number">0</b>`;
            } else {
                infoContainer.innerHTML = `<span class="pagination-label">Trang</span> <b class="pagination-number">${currentPage + 1}</b> / <b class="pagination-number">${totalPages}</b>`;
            }
        }

        // Ẩn phân trang nếu không có dữ liệu hoặc chỉ có 1 trang
        if (totalPages <= 1) {
            if (container) container.innerHTML = '';
            if (paginationRight) paginationRight.style.display = 'none';
            return;
        }

        // Hiện phân trang
        if (paginationRight) paginationRight.style.display = 'flex';

        // Tạo HTML phân trang
        let html = '';

        // Nút First và Previous
        html += `<button class="pagination-btn" ${currentPage === 0 ? 'disabled' : ''}
                    onclick="paginationManager['${this.containerId}'].goToPage(0)">
                    <i class="fas fa-angle-double-left"></i>
                </button>`;
        html += `<button class="pagination-btn" ${currentPage === 0 ? 'disabled' : ''}
                    onclick="paginationManager['${this.containerId}'].goToPage(${currentPage - 1})">
                    <i class="fas fa-chevron-left"></i>
                </button>`;

        // Tính toán dải số trang
        let startPage = Math.max(0, currentPage - 2);
        let endPage = Math.min(totalPages - 1, startPage + 4);
        if (endPage - startPage < 4) {
            startPage = Math.max(0, endPage - 4);
        }

        if (startPage > 0) {
            html += `<span class="pagination-dots">...</span>`;
        }

        for (let i = startPage; i <= endPage; i++) {
            html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}"
                        onclick="paginationManager['${this.containerId}'].goToPage(${i})">${i + 1}</button>`;
        }

        if (endPage < totalPages - 1) {
            html += `<span class="pagination-dots">...</span>`;
        }

        // Nút Next và Last
        html += `<button class="pagination-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''}
                    onclick="paginationManager['${this.containerId}'].goToPage(${currentPage + 1})">
                    <i class="fas fa-chevron-right"></i>
                </button>`;
        html += `<button class="pagination-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''}
                    onclick="paginationManager['${this.containerId}'].goToPage(${totalPages - 1})">
                    <i class="fas fa-angle-double-right"></i>
                </button>`;

        container.innerHTML = `<div class="pagination-container">${html}</div>`;

        // Gắn sự kiện Enter cho input nhảy trang
        const jumpInput = parentSection ? parentSection.querySelector('#jumpPageInput') : document.getElementById('jumpPageInput');
        if (jumpInput) {
            const newJumpInput = jumpInput.cloneNode(true);
            jumpInput.parentNode.replaceChild(newJumpInput, jumpInput);
            newJumpInput.onkeydown = (e) => {
                if (e.key === 'Enter') this.jumpToPage();
            };
        }
    }

    // Nhảy đến trang
    jumpToPage() {
        const parentSection = document.querySelector(this.parentSelector);
        const jumpInput = parentSection ? parentSection.querySelector('#jumpPageInput') : document.getElementById('jumpPageInput');

        if (!jumpInput) return;

        const pageNum = parseInt(jumpInput.value);

        if (isNaN(pageNum) || pageNum < 1 || pageNum > this.totalPages || this.totalPages === 0) {
            Swal.fire({
                icon: 'warning',
                title: 'Số trang không hợp lệ',
                text: `Vui lòng nhập số từ 1 đến ${this.totalPages}`,
                timer: 1500,
                showConfirmButton: false
            });
            jumpInput.value = '';
            return;
        }

        this.goToPage(pageNum - 1);
        jumpInput.value = '';
    }

    // Đi đến trang cụ thể
    goToPage(page) {
        if (page >= 0 && page < this.totalPages) {
            this.loadFunction(page);
        }
    }

    // Reset khi không có dữ liệu
    reset() {
        const container = document.getElementById(this.containerId);
        const parentSection = document.querySelector(this.parentSelector);
        const paginationRight = parentSection ? parentSection.querySelector('.pagination-right') : null;
        const infoContainer = document.getElementById(this.infoContainerId);

        if (container) container.innerHTML = '';
        if (paginationRight) paginationRight.style.display = 'none';
        if (infoContainer) infoContainer.innerHTML = 'Trang 0 / 0';

        this.totalPages = 0;
        this.currentPage = 0;
    }
}

// Lưu trữ các instance pagination
const paginationManager = {};

    // Bulk mode state
let bulkModeActive = false;
let selectedVocabIds = new Set();

// Toggle bulk mode
function toggleBulkMode() {
    bulkModeActive = !bulkModeActive;
    const toggleBtn = document.getElementById('toggleBulkModeBtn');
    const selectAllCheckbox = document.getElementById('selectAllVocab');
    const tableSection = document.querySelector('.table-vocab');

    if (bulkModeActive) {
        toggleBtn.innerHTML = '<i class="fas fa-times"></i> Thoát';
        toggleBtn.classList.add('active');
        tableSection.classList.add('bulk-mode-active');
        if (selectAllCheckbox) selectAllCheckbox.style.display = 'inline-block';
        // Clear selections when entering bulk mode
        selectedVocabIds.clear();
        updateBulkBar();
        // Reload để hiển thị checkbox thay vì STT
        const currentPage = paginationManager['vocabPagination']?.currentPage || 0;
        loadVocabWithPagination(currentPage);
    } else {
        toggleBtn.innerHTML = '<i class="fas fa-check-square"></i> Chọn nhiều';
        toggleBtn.classList.remove('active');
        tableSection.classList.remove('bulk-mode-active');
        if (selectAllCheckbox) {
            selectAllCheckbox.style.display = 'none';
            selectAllCheckbox.checked = false;
        }
        selectedVocabIds.clear();
        hideBulkBar();
        // Reload để hiển thị lại STT
        const currentPage = paginationManager['vocabPagination']?.currentPage || 0;
        loadVocabWithPagination(currentPage);
    }
}

// Update bulk action bar
function updateBulkBar() {
    let bar = document.getElementById('vocab-bulk-bar');
    if (!bar) {
        bar = document.createElement('div');
        bar.className = 'bulk-action-bar';
        bar.id = 'vocab-bulk-bar';
        bar.innerHTML = `
            <span>📌 Đã chọn: <span class="selected-count" id="vocab-selected-count">0</span> từ</span>
            <button class="btn-bulk btn-bulk-delete" onclick="bulkDeleteVocab()">
                <i class="fas fa-trash-alt"></i> Xóa
            </button>
            <button class="btn-bulk btn-bulk-cancel" onclick="clearVocabSelection()">
                <i class="fas fa-times"></i> Hủy chọn
            </button>
        `;
        document.body.appendChild(bar);
    }

    const countSpan = document.getElementById('vocab-selected-count');
    if (countSpan) countSpan.innerText = selectedVocabIds.size;

    if (selectedVocabIds.size > 0) {
        bar.classList.add('show');
    } else {
        bar.classList.remove('show');
    }
}

function hideBulkBar() {
    const bar = document.getElementById('vocab-bulk-bar');
    if (bar) bar.classList.remove('show');
}

function clearVocabSelection() {
    const checkboxes = document.querySelectorAll('#vocabTableBody .row-select-vocab');
    checkboxes.forEach(cb => {
        cb.checked = false;
        const id = parseInt(cb.value);
        selectedVocabIds.delete(id);
    });
    updateBulkBar();

    const selectAll = document.getElementById('selectAllVocab');
    if (selectAll) selectAll.checked = false;
}

function toggleSelectAllVocab() {
    const selectAll = document.getElementById('selectAllVocab');
    const checkboxes = document.querySelectorAll('#vocabTableBody .row-select-vocab');

    checkboxes.forEach(cb => {
        cb.checked = selectAll.checked;
        const id = parseInt(cb.value);
        if (selectAll.checked) {
            selectedVocabIds.add(id);
        } else {
            selectedVocabIds.delete(id);
        }
    });
    updateBulkBar();
}

function updateVocabSelection(checkbox) {
    const id = parseInt(checkbox.value);
    if (checkbox.checked) {
        selectedVocabIds.add(id);
    } else {
        selectedVocabIds.delete(id);
    }
    updateBulkBar();

    // Update select all checkbox state
    const selectAll = document.getElementById('selectAllVocab');
    if (selectAll) {
        const totalCheckboxes = document.querySelectorAll('#vocabTableBody .row-select-vocab').length;
        const checkedCheckboxes = document.querySelectorAll('#vocabTableBody .row-select-vocab:checked').length;
        selectAll.checked = totalCheckboxes > 0 && totalCheckboxes === checkedCheckboxes;
        selectAll.indeterminate = checkedCheckboxes > 0 && checkedCheckboxes < totalCheckboxes;
    }
}

async function bulkDeleteVocab() {
    if (selectedVocabIds.size === 0) return;

    const result = await Swal.fire({
        title: 'Xác nhận xóa',
        text: `Bạn có chắc muốn xóa ${selectedVocabIds.size} từ vựng đã chọn?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'Xóa',
        cancelButtonText: 'Hủy'
    });

    if (result.isConfirmed) {
        const token = localStorage.getItem('token');
        let successCount = 0;

        for (const id of selectedVocabIds) {
            try {
                const res = await fetch(`/api/admin/vocab/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) successCount++;
            } catch (e) { console.error(e); }
        }

        Swal.fire('Thành công', `Đã xóa ${successCount} từ vựng`, 'success');
        clearVocabSelection();
        // Exit bulk mode
        if (bulkModeActive) toggleBulkMode();
        // Reload data
        const currentPage = paginationManager['vocabPagination']?.currentPage || 0;
        loadVocabWithPagination(currentPage);
    }
}
