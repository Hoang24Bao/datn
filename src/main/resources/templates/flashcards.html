<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='FLashcard')}">
    <title>Flashcard</title>
</head>

<body>
<th:block th:replace="~{layout :: spinner}"></th:block>
<th:block th:replace="~{layout :: navbar}" th:with="currentPage='flashcard'"></th:block>


    <!--Header Start-->
    <div class="container-fluid bg-primary py-2 mb-1">
        <div class="container text-center">
            <h3 class="text-white m-0" style="font-size: 25px;">Đang học: <span id="lesson-name">Tiếng Nhật</span></h3>
        </div>
    </div>
    <!--Header End-->


    <!--Learning Start-->
    <div class="container py-3">
        <div class="learning-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="text-muted small">Tiến trình học</span>
                <span id="progress-text" class="fw-bold" style="color: #fb873f;">1/10</span>
            </div>
            <div class="progress mb-4" style="height: 10px; border-radius: 10px;">
                <div id="progress-bar" class="progress-bar" style="width: 10%; background-color: #fb873f;"></div>
            </div>

            <div class="position-relative d-flex align-items-center">
                <button class="btn-nav btn-nav-left" onclick="prevWord()">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <div class="flashcard-container" onclick="toggleFlip()">
                    <div class="flashcard" id="flashcard">
                        <div class="card-front">
                            <button onclick="playAudio(event)" class="btn-audio">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <img id="vocab-img" src="img/course-1.jpg" alt="Từ vựng" class="vocab-img">
                            <div id="vocab-expression" class="expression-text">林檎</div>
                            <div id="vocab-kana" class="jp-text">りんご</div>
                            <div id="vocab-romaji" class="romaji-text">ringo</div>
                            <audio id="vocab-audio" src=""></audio>
                        </div>
                        <div class="card-back">
                            <p class="text-muted mb-3" style="font-size: 20px; font-weight: bold;">Ý nghĩa</p>
                            <div id="vocab-vn" class="vn-text">Quả táo</div>
                            <hr class="w-100">
                            <p class="small text-muted" style="font-size: 15px;">Nhấn vào thẻ để xem mặt trước</p>
                        </div>
                    </div>
                </div>

                <button class="btn-nav btn-nav-right" onclick="nextWord()">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-0">
                <button class="btn-learn btn-control btn-not-learned" style="font-size: 15px;">
                    <i class="fas fa-chevron-left me-2"></i>Chưa thuộc
                </button>
                <button class="btn-learn btn-control btn-learned">
                    Đã thuộc<i class="fas fa-chevron-right ms-2"></i>
                </button>
            </div>

        </div>
    </div>
    <!--Learning End-->


<th:block th:replace="~{layout :: footer}"></th:block>

            { expression: "描く", kana: "かく", vn: "vẽ", romaji: "kaku", img: "vocab/b09bfe41dc9ba6a19b4661fc20af6a13.jpg", audio: "audio/b09bfe41dc9ba6a19b4661fc20af6a13.mp3" },

            { expression: "勉強", kana: "べんきょう", vn: "học tập", romaji: "benkyou", img: "vocab/f19c9dd8b9e2fcd2ff2bc0a44c509ee5.jpg", audio: "audio/f19c9dd8b9e2fcd2ff2bc0a44c509ee5.mp3" },
            { expression: "分かる", kana: "わかる", vn: "hiểu", romaji: "wakaru", img: "vocab/12175486f45acc5740ce3d8a6a36a11e.jpg", audio: "audio/12175486f45acc5740ce3d8a6a36a11e.mp3" }
        ];

        let currentIndex = 0;

        function toggleFlip() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function updateUI() {
            // 1. Tắt hiệu ứng transition tạm thời để reset mặt thẻ ngay lập tức
            const flashcard = document.getElementById('flashcard');
            flashcard.style.transition = 'none';
            flashcard.classList.remove('flipped');

            // 2. Ép trình duyệt ghi nhận việc bỏ class flipped ngay lúc này (Tránh bị dính hiệu ứng)
            void flashcard.offsetWidth;

            // 3. Cập nhật nội dung từ vựng mới
            const word = vocabulary[currentIndex];
            document.getElementById('vocab-expression').innerText = word.expression;
            document.getElementById('vocab-kana').innerText = word.kana;
            document.getElementById('vocab-vn').innerText = word.vn;
            document.getElementById('vocab-romaji').innerText = word.romaji;
            document.getElementById('vocab-img').src = word.img;
            document.getElementById('vocab-audio').src = word.audio;

            // 4. Bật lại hiệu ứng transition sau khi đã reset xong nội dung
            setTimeout(() => {
                flashcard.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            }, 10);

            // 5. Cập nhật tiến trình (Giữ nguyên)
            const total = vocabulary.length;
            document.getElementById('progress-text').innerText = `${currentIndex + 1}/${total}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / total) * 100}%`;
        }

        function nextWord() {
            if (currentIndex < vocabulary.length - 1) {
                currentIndex++;
                updateUI();
            } else {
                alert("Chúc mừng! Bạn đã hoàn thành bài học.");
                window.location.href = "lesson";
            }
        }

        function prevWord() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        // Hàm phát âm thanh
        function playAudio(event) {
            event.stopPropagation();
            const audio = document.getElementById('vocab-audio');
            audio.play();
        }

        updateUI(); // Khởi tạo giao diện với từ vựng đầu tiên
    </script>

</body>

</html>
