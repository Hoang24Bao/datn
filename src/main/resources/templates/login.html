<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='Đăng nhập - Ganbatte')}">
    <title>Đăng nhập</title>
</head>

<style>
    .link-login {
        color: #06BBCC;
        transition: 0.3s;
    }

    .link-login:hover {
        color: #0096a6;
    }
</style>

<body>
<th:block th:replace="~{layout :: spinner}"></th:block>
<th:block th:replace="~{layout :: navbar}"></th:block>

<div class="container-fluid bg-primary py-5 mb-5 page-header5">
    <div class="container py-5 text-center">
        <h1 class="display-3 text-white animated slideInDown">Đăng nhập</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item"><a class="text-white" th:href="@{/}">Trang chủ</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page">Đăng nhập</li>
            </ol>
        </nav>
    </div>
</div>
<div class="container-xxl py-5 mt-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.5s">
                <form id="loginForm" class="shadow p-4 bg-white" style="border-radius: 20px;">
                    <div class="text-center mb-4">
                        <h1 class="mb-3">Đăng nhập</h1>
                        <p class="text-muted">Học tiếng Nhật cùng Ganbatte</p>
                    </div>

                    <div class="row g-3">
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="username" placeholder="Username hoặc Email" required>
                                <label for="username">Username / Email</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                                <label for="password">Mật khẩu</label>
                            </div>
                        </div>

                        <div class="col-12 text-end">
                            <a class="text-decoration-none small" href="#" style="color: #fb873f;">Quên mật khẩu?</a>
                        </div>

                        <div class="col-12">
                            <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm" type="submit">
                                ĐĂNG NHẬP
                            </button>
                        </div>

                        <div class="col-12 text-center mt-3">
                            <p>Chưa có tài khoản? <a class="fw-bold text-decoration-none link-signup" th:href="@{/signup}">Đăng ký ngay</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{layout :: footer}"></th:block>


<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const loginData = {
            userName: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(loginData)
            });

            if (response.ok) {
                const data = await response.json();

                // Lưu thông tin vào LocalStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.userName);
                localStorage.setItem('fullname', data.fullname);
                localStorage.setItem('role', data.role);
                localStorage.setItem('userId', data.id);

                // Thông báo thành công đẹp mắt
                Swal.fire({
                    icon: 'success',
                    title: 'Đăng nhập thành công!',
                    text: 'Chào mừng bạn quay trở lại với Ganbatte!',
                    showConfirmButton: false,
                    timer: 1500,
                }).then(() => {
                    // Chuyển hướng dựa trên Role
                    if (data.role === 'ROLE_ADMIN' || data.role === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/';
                    }
                });
            } else {
                const errorMsg = await response.text();
                Swal.fire({
                    icon: 'error',
                    title: 'Đăng nhập thất bại',
                    text: errorMsg || 'Tên đăng nhập hoặc mật khẩu không chính xác!',
                    confirmButtonColor: '#fb873f'
                });
            }
        } catch (error) {
            console.error('Error:', error);
            Swal.fire({
                icon: 'error',
                title: 'Lỗi kết nối',
                text: 'Không thể kết nối tới Server. Vui lòng thử lại sau!',
                confirmButtonColor: '#fb873f'
            });
        }
    });
</script>

</body>
</html>
