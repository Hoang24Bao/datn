<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: html_head(title='Lesson')}">
    <title>Lesson</title>
</head>

<body>
<th:block th:replace="~{layout :: spinner}"></th:block>
<th:block th:replace="~{layout :: navbar}" th:with="currentPage='vocab'"></th:block>

<!-- Header Start -->
<div class="container-fluid bg-primary py-3 mb-4"
     th:style="'background: linear-gradient(rgba(24, 29, 56, .5), rgba(24, 29, 56, .7)),
     url(' + @{${lesson.thumbnailUrl}} + '); background-position: center center; background-repeat: no-repeat; background-size: cover;'">
    <div class="container py-5 text-center">
        <h1 class="display-3 text-white animated slideInDown">Chủ đề: Đồ ăn</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item"><a class="text-white" href="index.html">Trang chủ</a></li>
                <li class="breadcrumb-item"><a class="text-white" href="categories.html">Từ vựng</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page">Đồ ăn</li>
            </ol>
        </nav>
    </div>
</div>
<!-- Header Start -->


<div class="container pt-2">
    <div id="lesson-list-container" class="lesson-container">
    </div>
</div>


<th:block th:replace="~{layout :: footer}"></th:block>


<script>
    // 1. Danh sách bài học (Bạn có thể thêm bao nhiêu bài tùy ý vào đây)
    const lessons = [
        { id: 1, title: "Bài 1", vocabs: 30, examples: 10, progress: 35, status: "current" },
        { id: 2, title: "Bài 2", vocabs: 15, examples: 7, progress: 10, status: "current" },
        { id: 3, title: "Bài 3: Đồ uống & Tráng miệng", vocabs: 12, examples: 4, progress: 0, status: "locked" },
        { id: 4, title: "Bài 4: Phương tiện giao thông", vocabs: 20, examples: 5, progress: 0, status: "locked" }
    ];

    // 2. Hàm tạo giao diện
    function renderLessons() {
        const container = document.getElementById('lesson-list-container');

        container.innerHTML = lessons.map(lesson => {
            const isLocked = lesson.status === 'locked';

            return `
        <div class="lesson-group mb-4">
            <div class="lesson-item shadow-sm ${isLocked ? 'status-locked' : 'status-current'}">
                <div class="lesson-icon ${isLocked ? 'icon-locked' : 'icon-current'}">
                    ${isLocked ? '<i class="fas fa-lock"></i>' : `<span>${lesson.id}</span>`}
                </div>
                <div class="ms-4 flex-grow-1">
                    <h5 class="fw-bold mb-1">${lesson.title}</h5>
                    <p class="text-muted small mb-2">${lesson.vocabs} từ vựng | ${lesson.examples} ví dụ</p>
                    <div class="progress" style="height: 6px; width: 100%; max-width: 500px;">
                        <div class="progress-bar" style="width: ${lesson.progress}%; background-color: #fb873f;"></div>
                    </div>
                </div>
                <div>
                    ${isLocked
                    ? '<button class="btn btn-secondary disabled rounded-pill px-4">Đã khóa</button>'
                    : `<button class="btn btn-warning text-white fw-bold px-4 rounded-pill shadow-sm"
                                   type="button" data-bs-toggle="collapse" data-bs-target="#sub-modes-${lesson.id}"
                                   style="padding-top: 12px; padding-bottom: 12px;">
                             Học ngay
                           </button>`
                }
                </div>
            </div>

            ${!isLocked ? `
            <div class="collapse mt-2" id="sub-modes-${lesson.id}" data-bs-parent="#lesson-list-container">
                <div class="d-flex flex-column gap-2 ms-5 ps-3 border-start" style="border-width: 3px !important; gap: 5px;">

                    <div class="lesson-item shadow-sm p-2 bg-white border" style="min-height: 50px; border-radius: 15px; margin-bottom: 0;">
                        <div class="lesson-icon icon-current shadow-none" style="width: 50px; height: 50px; min-width: 50px; background: #007bff;">
                            <i class="fas fa-clone fs-5 text-white"></i>
                        </div>
                        <div class="ms-3 flex-grow-1">
                            <h6 class="fw-bold mb-0" style="font-size: 1rem;">Chế độ Flashcard</h6>
                        </div>
                        <a href="/flashcards?id=${lesson.id}" class="fw-bold rounded-pill px-4 py-2 shadow-sm"
                            style="background-color: #007bff !important; border-color: #007bff !important; color: white !important;">Vào học</a>
                    </div>

                    <div class="lesson-item shadow-sm p-2 bg-white border" style="min-height: 50px; border-radius: 15px; margin-bottom: 0;">
                        <div class="lesson-icon icon-current shadow-none" style="width: 50px; height: 50px; min-width: 50px; background: #28a745;">
                            <i class="fas fa-th-large fs-5 text-white"></i>
                        </div>
                        <div class="ms-3 flex-grow-1">
                            <h6 class="fw-bold mb-0" style="font-size: 1rem;">Liệt kê hình ảnh</h6>
                        </div>
                        <a href="gallery.html?id=${lesson.id}" class="btn-success fw-bold rounded-pill px-4 py-2 shadow-sm"
                         style="background-color: #28a745 !important; border-color: #28a745 !important; color: white !important;">Vào học</a>
                    </div>

                    <div class="lesson-item shadow-sm p-2 bg-white border" style="min-height: 50px; border-radius: 15px; margin-bottom: 0;">
                        <div class="lesson-icon icon-current shadow-none" style="width: 50px; height: 50px; min-width: 50px; background: #dc3545;">
                            <i class="fas fa-mouse-pointer fs-5 text-white"></i>
                        </div>
                        <div class="ms-3 flex-grow-1">
                            <h6 class="fw-bold mb-0" style="font-size: 1rem;">Hình ảnh tương tác</h6>
                        </div>
                        <a href="interactive.html?id=${lesson.id}" class="btn-danger fw-bold rounded-pill px-4 py-2 shadow-sm">Vào học</a>
                    </div>

                </div>
            </div>
            ` : ''}
        </div>`;
        }).join('');
    }

    document.addEventListener('DOMContentLoaded', renderLessons);
</script>

</body>

</html>
