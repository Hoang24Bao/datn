spring.application.name=datn
server.port=8080

# Ket noi SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=datn;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=042311
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Cau hinh de load file HTML tu templates (neu can)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false